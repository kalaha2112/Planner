    border: 1px solid var(--line);
    border-radius: var(--r-card);
    overflow: hidden;
  }
  .leaf-route .main-map-wrap { position: absolute; inset: 0; width: 100%; height: 100%; aspect-ratio: unset; }
  .leaf-route .main-map-leaflet { border: none; border-radius: 0; }
  .leaf-route .placed-stickers-layer { position: absolute; inset: 24px 12px 24px 24px; z-index: 4; }
  /* the info panel is a real column beside the map, not an overlay on top of it */
  .ledger-col {
    position: relative; min-height: 0; height: 100%;
    display: flex; flex-direction: column; gap: 14px;
    overflow-y: auto; scrollbar-width: thin;
    padding: 56px 20px 24px 20px;   /* top clears the fixed action icons */
    /* right margin = tab width (40px) + a 12px gap, matching the map's own
       12px gap on its right — dock↔map and dock↔tabs read as equal spacing */
    margin-right: 52px;
    background: var(--shell);
  }
  /* ---- stop preview card (fills the old to-do slot): hover a pin on the
     map to preview that stop; + (add stop) opens a fresh entry card here ---- */
  .stop-spot { flex-shrink: 0; }
  .ss-hint {
    border: 1.5px dashed var(--line); border-radius: var(--r-card);
    padding: 20px 18px; text-align: center;
    font-family: var(--sans); font-size: 12px; line-height: 1.55; color: var(--ink-mute);
  }
  .ss-hint b { color: var(--ink); font-weight: 600; }
  .ss-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card);
    padding: 15px 17px 13px;
    animation: pkCardIn .18s ease both;
  }
  .ss-top { display: flex; align-items: center; gap: 10px; }
  .ss-num {
    flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
    background: var(--red); color: #fff;
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .ss-card input.city {
    flex: 1; min-width: 0; border: none; background: transparent; padding: 2px 0;
    font-family: var(--serif); font-size: 21px; font-weight: 700; letter-spacing: -.01em; color: var(--ink);
  }
  .ss-card input.city::placeholder { color: var(--ink-faint); font-weight: 400; }
  .ss-x { flex-shrink: 0; border: none; background: transparent; color: var(--ink-faint); cursor: pointer; padding: 4px; font-size: 14px; line-height: 1; }
  .ss-x:hover { color: var(--red); }
  /* the stop list — a numbered marker (edit to reorder) + name + ✕ per stop */
  .ss-list { list-style: none; margin: 0; padding: 2px 0 0; display: flex; flex-direction: column; }
  .ss-li { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--line-soft); }
  .ss-li:last-child { border-bottom: none; }
  .ss-num-input {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    border: none; background: var(--red); color: #fff; padding: 0; cursor: pointer;
    font-family: var(--sans); font-size: 11px; font-weight: 700; text-align: center; line-height: 22px;
    appearance: none; -moz-appearance: textfield;
  }
  .ss-num-input::-webkit-inner-spin-button, .ss-num-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .ss-num-input:focus { outline: none; box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--red); }
  .ss-li-name {
    flex: 1; min-width: 0; min-height: 1.25em; text-align: left; border: none; background: transparent; padding: 2px 0; cursor: pointer;
    font-family: var(--serif); font-size: 16px; font-weight: 600; letter-spacing: -.01em; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .14s;
  }
  .ss-li-name:hover { color: var(--red); }
  .ss-dates { display: flex; align-items: baseline; flex-wrap: wrap; gap: 0 2px; margin: 4px 0 0 30px; font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--green-dark); }
  .ss-nights { display: inline-flex; align-items: baseline; gap: 3px; }
  .ss-nights input {
    width: 2.6em; text-align: center; padding: 0 2px 1px;
    border: none; border-bottom: 1px solid var(--line); background: transparent;
    font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--green-dark);
  }
  .ss-nights input:focus { outline: none; border-bottom-color: var(--red); }
  .ss-leg { display: flex; align-items: center; gap: 7px; margin: 7px 0 0 30px; font-family: var(--sans); font-size: 11.5px; color: var(--ink-soft); }
  .ss-leg .mode-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ss-hotel { display: flex; align-items: center; gap: 6px; margin: 6px 0 0 30px; font-family: var(--sans); font-size: 11.5px; color: var(--ink-soft); }
  .ss-btns { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 0 30px; }
  .ss-btns button {
    font-family: var(--sans); font-size: 10.5px; font-weight: 600; letter-spacing: .02em;
    color: var(--ink-soft); background: transparent;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 11px; cursor: pointer;
    transition: color .14s, border-color .14s;
  }
  .ss-btns button:hover { color: var(--red); border-color: var(--red); }

  /* date range as prose — no box, no labels, darker green */
  .ledger-col .meta-range {
    display: flex; align-items: baseline; flex-wrap: wrap; gap: 0;
    margin: 0; padding: 2px 0; flex-shrink: 0;
    font-family: var(--serif); font-size: 21px; font-weight: 600; letter-spacing: -.01em;
    color: var(--green-dark);
  }
  .meta-range .date-tail { white-space: nowrap; }   /* year never orphans from the return date */
  .meta-range .date-seg { position: relative; display: inline-block; cursor: pointer; color: inherit; white-space: nowrap; }
  .meta-range .date-seg:hover .date-txt,
  .meta-range .date-seg:focus-visible .date-txt {
    text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px;
  }
  .meta-range .date-seg:focus-visible { outline: none; }
  /* the native picker input: invisible, parked just below its date so the
     calendar drops down under the line; clicks land on the seg (showPicker) */
  .meta-range .date-native {
    position: absolute; left: 0; top: 100%; width: 1px; height: 1px;
    opacity: 0; border: none; padding: 0; margin: 0; pointer-events: none;
  }
  .meta-range .date-dash { margin: 0 8px; color: var(--green-dark); }
  .meta-range .date-year { color: var(--green-dark); }
  .meta-range .saved { display: none; }
  .ledger-col .summary,
  .ledger-col .todos { flex-shrink: 0; }
  /* the split stat was sized for the app's 290px aside — trim its air here */
  .ledger-col .stat-split .stat-half:first-child { padding-right: 34px; }

  /* the bill: a modal again, but it prints down over the info-panel area —
     the printer housing lines up with the top of the date-range block (the
     panel's first row, 56px down), not the top page edge, and the panel is
     the viewport's right 360px now that pages are full-bleed */
  .overlay[data-act="overlay-budget"] {
    justify-content: flex-end;
    align-items: flex-start;
    /* right padding nudges the bill left so it lands exactly on the map's
       new (12px-inset) right edge, instead of hugging the page's far edge */
    padding: 56px 12px 30px 20px;
    /* no scrim on the ledger — the map stays crisp; only what's directly
       behind the bill is hidden (below) */
    background: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }
  /* 12px narrower than the dock's original 360px — the box stays right-
     aligned, so this opens a matching 12px gap to the map on the left
     without touching the existing 12px gap to the page's right edge */
  .overlay[data-act="overlay-budget"] .receipt-wrap {
    width: 348px; max-width: 348px; flex: 0 0 348px;
  }
  /* the bill covers the info panel exactly — blank the panel's contents while
     it's open (the panel surface itself stays, as the paper's backing) */
  .ledger-book.bill-open .ledger-col > * { visibility: hidden; }

  /* ---- pages 2 & 3 share the ruled-leaf chrome ---- */
  .leaf-plan .leaf-inner,
  .leaf-days .leaf-inner {
    display: flex; flex-direction: column;
    padding: 24px 54px 30px 42px;   /* right room clears the edge tabs */
    background: var(--surface);     /* plain paper — notebook ruling + margin line removed */
  }
  .leaf-head {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 18px;
    border-bottom: 2px solid var(--line);
    padding-bottom: 14px; margin-bottom: 4px; flex: none;
  }
  .leaf-head .eyebrow { margin-bottom: 6px; }
  .leaf-title { font-family: var(--serif); font-size: 34px; font-weight: 700; letter-spacing: -.015em; line-height: 1; color: var(--ink); }
  .leaf-sub { font-family: var(--script); font-style: italic; font-size: 14px; color: var(--green); margin-top: 6px; min-height: 17px; }
  .leaf-pills { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; max-width: 46%; padding-bottom: 2px; }
  .leaf-pill {
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    color: var(--ink); background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--r-pill);
    padding: 6px 14px; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .leaf-pill:hover { background: var(--hover-soft); }
  .leaf-pill.on { background: var(--brown); color: var(--on-brown); border-color: var(--brown); }

  /* page 2: transport | hotels ledger columns */
  .leaf-plan-cols { display: flex; flex: 1 1 auto; min-height: 0; }
  .plan-col { flex: 1 1 0; min-width: 0; overflow-y: auto; scrollbar-width: thin; padding: 18px 26px 24px 0; }
  .plan-col + .plan-col { border-left: 1px solid var(--line-soft); padding-left: 30px; padding-right: 4px; }
  .plan-col-hd {
    font-family: var(--caps); font-size: 13px; letter-spacing: .18em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 14px;
  }
  .plan-col .transport-body { padding: 0; }   /* modal padding stays in the dialog */
  .plan-col .accom-body { padding: 0; }

  /* page 3: the itinerary working area fills the leaf */
  .leaf-days .iti-body { flex: 1 1 auto; min-height: 0; margin-top: 8px; }
  .leaf-days .iti-left { padding-left: 0; }
  .leaf-days .cal { margin-top: 10px; }

  /* ---- page tabs, flush to the viewport's lower-right edge ---- */
  .ledger-tabs {
    position: absolute; bottom: 30px; right: 0; width: 40px;
    display: flex; flex-direction: column; gap: 10px;
    z-index: 7;
  }
  /* hide the tabs while the bill prints so nothing peeks past the receipt */
  .ledger-book.bill-open .ledger-tabs { display: none; }
  .ledger-tab {
    writing-mode: vertical-rl;
    font-family: var(--caps); font-size: 12.5px; letter-spacing: .15em; text-transform: uppercase;
    color: var(--ink-soft); background: var(--surface);
    border: 1px solid var(--line); border-right: none;
    border-radius: 9px 0 0 9px;
    padding: 14px 5px; cursor: pointer;
    box-shadow: -3px 3px 10px rgba(35, 20, 12, .10);
    transition: transform .18s, color .15s, background .15s;
  }
  .ledger-tab:hover { transform: translateX(-3px); color: var(--ink); }
  .ledger-tab.on { background: var(--brown); color: var(--on-brown); border-color: var(--brown); transform: translateX(-2px); }
  /* the Route tab is a home glyph, not a wordmark — center it, no vertical text */
  .ledger-tab--icon {
    writing-mode: horizontal-tb;
    display: flex; align-items: center; justify-content: center;
    padding: 12px 5px;
  }
  .ledger-tab--icon svg { display: block; }

  /* ---- fore-edge / spine page-turn zones ---- */
  .ledger-edge {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 32px; height: 84px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sans); font-size: 26px; font-weight: 300; line-height: 1;
    color: var(--ink-mute); background: transparent; border: none;
    cursor: pointer; z-index: 7; opacity: .55;
    transition: opacity .15s, color .15s;
  }
  .ledger-edge:hover { opacity: 1; color: var(--ink); }
  .ledger-edge.prev { left: -1px; }
  .ledger-edge.next { right: -1px; }
  .ledger-book[data-page="3"] .ledger-edge.next { visibility: hidden; }

  /* ---- page 4 · packing blueprint + to-dos ---- */
  .leaf-pack .leaf-inner { display: flex; flex-direction: column; }
  /* inset the header to match the other pages (leaf-inner padding 24/54/·/42),
     which the packing leaf-inner doesn't carry */
  .leaf-pack .leaf-head { margin: 24px 54px 4px 42px; }
  /* right padding matches the header (54px) so the pre-trip to-do clears the
     page tabs on the right edge; the 22px flex gap keeps it off the suitcase */
  .pack-cols { display: flex; gap: 22px; flex: 1 1 auto; min-height: 0; padding: 0 54px 20px 24px; }
  /* the carry-on and its checklist share the main column; the pre-trip to-do
     panel sits on the right, vertically centred (middle-right) with no box.
     On wide screens the packing checklist docks to the LEFT of the sheet
     (order:-1); on narrow screens it drops below it (see media query). */
  .pk-main { flex: 1 1 auto; min-width: 0; min-height: 0; display: flex; gap: 22px; }
  .pk-wrap { flex: 1 1 auto; min-width: 0; min-height: 0; display: flex; align-items: center; justify-content: center; }
  /* margin-right pulls the pre-trip to-do further left (off the right edge);
     the 22px flex gap before it keeps it clear of the suitcase */
  .pack-side { flex: 0 1 280px; min-width: 180px; align-self: center; overflow-y: auto; padding: 4px 4px 10px 0; margin-right: 76px; }
  .pack-side .todos { background: none; border: none; border-radius: 0; padding: 0; }
  /* mirror the pre-trip to-do: a 76px left margin pulls the category checklist
     off the left edge; the 22px flex gap after it keeps it clear of the suitcase */
  .pk-panel { order: -1; flex: 0 1 230px; min-width: 160px; align-self: center; overflow-y: auto; padding: 4px 0 10px; margin-left: 76px; display: flex; flex-direction: column; justify-content: center; }

}

/* narrow ledger (e.g. iPad portrait): the carry-on takes the full main column
   and its checklist drops BELOW it, so the sheet is never squeezed */
@media (min-width: 701px) and (max-width: 900px) {
  .pack-cols { gap: 16px; padding: 0 50px 16px 16px; }
  .pk-main { flex-direction: column; gap: 14px; justify-content: center; }
  .pk-wrap { flex: 0 1 auto; }
  .pk-panel { order: 0; flex: 0 1 auto; width: 100%; max-width: 460px; min-width: 0;
              max-height: 42%; align-self: center; justify-content: flex-start; }
  .pack-side { min-width: 158px; }
}

/* ============================================================
   PACKING SHEET — shared by the web ledger's page 4 and the
   phone app's Packing card (between the stats and the to-dos).
   ============================================================ */
/* the sheet: dot-grid paper, the line-art carry-on tinted with theme ink.
   Closed by default; .anim-open crossfades to the open case and the chips
   rise out of it on their dashed leaders. */
.pk-bp {
  position: relative; width: 100%; max-width: 620px; aspect-ratio: 640 / 560;
  max-height: 100%; margin: auto;
  background-image: radial-gradient(var(--ledger-rule, rgba(26, 26, 26, .05)) 1px, transparent 1.3px);
  background-size: 24px 24px;
  /* cqw below ties icon size to the sheet's own rendered width, so icons
     scale with the carry-on drawing itself (web's big sheet vs. the
     phone card's small one) instead of needing separate fixed-px tuning */
  container-type: inline-size;
}
.pk-art {
  position: absolute; background: var(--ink);
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-position: center; mask-position: center;
  transition: opacity .42s ease, transform .48s cubic-bezier(.22, .61, .36, 1);
}
.pk-art--closed { left: 33%; top: 22%; width: 34%; height: 70%; }
.pk-art--open { left: 12%; top: 34%; width: 76%; height: 62%; }
.pk-bp:not(.anim-open) .pk-art--open { opacity: 0; transform: scale(.9); }
.pk-bp.anim-open .pk-art--closed { opacity: 0; transform: scale(.94) translateY(8px); }

/* dashed leaders grow up out of the case (origin at the case end) */
.pk-leads { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
.pk-leads line {
  stroke: var(--ink-faint); stroke-width: 1.6; stroke-dasharray: 2 6; stroke-linecap: round;
  transform-box: fill-box; transform-origin: center bottom;
  transform: scaleY(0); transition: transform .5s ease;
}
.pk-leads circle { fill: var(--ink-faint); opacity: 0; transition: opacity .4s ease; }
.pk-bp.anim-open .pk-leads line { transform: scaleY(1); }
.pk-bp.anim-open .pk-leads circle { opacity: 1; }

/* a rising chip: label + count pill, also the hover/tap checklist target */
.pk-slot {
  position: absolute; width: 112px; height: 44px; cursor: pointer; z-index: 5; border-radius: 999px;
  opacity: 0; transform: translate(-50%, calc(-50% + 42px));
  transition: opacity .5s ease, transform .55s cubic-bezier(.22, .61, .36, 1);
  pointer-events: none;
}
.pk-bp.anim-open .pk-slot { opacity: 1; transform: translate(-50%, -50%); pointer-events: auto; }
.pk-slot:hover, .pk-slot:focus-within, .pk-slot.open { z-index: 30; }
.pk-slot::before {
  content: ''; position: absolute; inset: 0; border-radius: 999px;
  border: 1.5px dashed transparent; transition: border-color .15s;
}
.pk-slot:hover::before, .pk-slot.open::before { border-color: color-mix(in srgb, var(--red) 55%, transparent); }
/* the category's line-art icon (once uploaded) replaces the text label and
   floats just above the count pill — it's the primary identifier now, sized
   as a fraction of the sheet's own width (see container-type on .pk-bp) so
   it scales in lockstep with the carry-on drawing. Decorative/non-interactive:
   it rides the same rise/fade transform as the chip since it's a child of
   .pk-slot, without touching the chip's own tuned position. */
.pk-icon {
  position: absolute; left: 50%; bottom: calc(100% + 6px); transform: translateX(-50%);
  width: 7.5cqw; height: 7.5cqw; background: var(--ink);
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-position: center; mask-position: center;
  /* the icon is the click target that opens its category checklist */
  pointer-events: auto; cursor: pointer; transition: transform .15s ease;
}
.pk-icon:hover { transform: translateX(-50%) scale(1.08); }
.pk-icon:active { transform: translateX(-50%) scale(.94); }
/* uploaded full-colour category icon: an image, not an ink mask */
.pk-icon--photo {
  background: none; -webkit-mask-image: none; mask-image: none; filter: none;
  display: grid; place-items: center;
}
.pk-icon--photo img { width: 100%; height: 100%; object-fit: contain; object-position: center bottom; display: block; pointer-events: none; }
.pk-chip {
  position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
  display: flex; align-items: baseline; gap: 6px; white-space: nowrap;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 999px; padding: 3px 10px 4px;
}
.pk-lab { font-family: var(--mono); font-size: 8.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-mute); }
.pk-cnt { font-family: var(--sans); font-size: 10px; font-weight: 700; color: var(--red); font-variant-numeric: tabular-nums; }
.pk-cnt.full { color: var(--green); }
/* icon-bearing slots don't need the wider label pill — narrower, cqw-scaled */
.pk-slot.has-icon { width: 11cqw; min-width: 56px; }
@media (prefers-reduced-motion: reduce) {
  .pk-art, .pk-slot, .pk-leads line, .pk-leads circle { transition: none !important; }
}

/* the checklist card inside the panel */
.pk-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
  padding: 13px 15px 11px; text-align: left;
  box-shadow: 0 14px 36px rgba(35, 20, 12, .12);
  animation: pkCardIn .18s ease both;
}
@keyframes pkCardIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }
.pk-hint {
  border: 1.5px dashed var(--line); border-radius: 12px;
  padding: 22px 18px; text-align: center;
  font-family: var(--sans); font-size: 12px; line-height: 1.5; color: var(--ink-mute);
}
.pk-hd { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
.pk-hd .t { font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--ink); }
.pk-hd .p { font-family: var(--mono); font-size: 10px; color: var(--ink-mute); margin-left: auto; font-variant-numeric: tabular-nums; }
.pk-hd .x { border: none; background: transparent; color: var(--ink-faint); font-size: 12px; line-height: 1; cursor: pointer; padding: 2px 4px; }
.pk-hd .x:hover { color: var(--ink); }
.pk-card .todo { padding: 4px 0; }
.pk-none { font-family: var(--sans); font-size: 12px; color: var(--ink-mute); margin: 6px 0 8px; }
.pk-card .add-todo { margin-top: 2px; }

/* phone app: the sheet lives in a .todos-style card — everything scales down,
   and the checklist opens inline UNDER the sheet instead of docked beside it */
.pack-block { border: none; background: none; padding: 17px 0 13px; }
.pack-block .pk-bp { max-width: 100%; margin-top: 38px; }   /* headroom for icons rising above the topmost chips */
.pack-block .pk-slot { width: 92px; height: 38px; }
/* icon size comes from the base cqw rule (scales with .pk-bp's own width,
   already narrower here) — only the gap needs a smaller phone value */
.pack-block .pk-icon { bottom: calc(100% + 4px); }
.pack-block .pk-slot.has-icon { width: 11cqw; min-width: 44px; }
.pack-block .pk-chip { padding: 2px 7px 3px; gap: 4px; }
.pack-block .pk-lab { font-size: 7px; letter-spacing: .1em; }
.pack-block .pk-cnt { font-size: 9px; }
.pack-block .pk-panel { display: block; margin-top: 10px; }
.pack-block .pk-panel:empty { margin-top: 0; }
.pack-block .pk-card { box-shadow: none; }

/* ============================================================
   STOP CARDS — proportional scaling via CSS container queries
   .map-stop has container-type:inline-size so all cqw values
   inside the card are relative to the card's own width.
   Card width = 28% of canvas = 207px at natural 740px canvas.
   Conversion: Xpx → (X/207 × 100)cqw  ≈  X/2.07 cqw
   ============================================================ */
.map-stop {
  position: absolute;
  width: 20%; /* scales with canvas */
  padding: 0; contain: none; z-index: 2;
  container-type: inline-size; /* cqw = % of card width */
  perspective: 338cqw; /* 700px / 207px × 100 */
}

/* flip wrapper — height proportional to width via aspect-ratio */
.mc-flip {
  position: relative;
  aspect-ratio: 210 / 100;
  padding: 0; box-shadow: none;
  /* the .card class gives this a solid white background/border; clear it so the
     80%-transparent faces actually let the map show through (the faces carry
     their own border + shadow) */
  background: transparent; border: none;
  transform-style: preserve-3d;
  transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1) 0.18s;
}
.map-stop:not(.mc-dragging):hover .mc-flip,
.map-stop:not(.mc-dragging):focus-within .mc-flip,
.map-stop.mc-editing .mc-flip {
  transform: rotateY(180deg); transition-delay: 0s;
}
.map-stop.mc-dragging .mc-flip { transform: rotateY(180deg); transition: none; }

/* shared face — 80% opaque white (20% transparent) so the map reads faintly
   through the stop card, on every screen size and in both builds */
.mc-front, .mc-back {
  position: absolute; inset: 0;
  border-radius: var(--r-card);
  border: 1px solid var(--line);
  background: var(--card-glass);
  box-shadow: 0 2px 10px rgba(33,26,24,.10);
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  overflow: hidden;
}

/* FRONT face — all sizes in cqw */
.mc-front {
  padding: 4.3cqw 5.8cqw 4.3cqw;
  display: flex; flex-direction: column; justify-content: flex-start; gap: 2cqw;
  cursor: default;
}
.mc-mode-pip {
  position: absolute; top: 4.3cqw; right: 5.8cqw;
  width: 2.9cqw; height: 2.9cqw;
  border-radius: 50%; opacity: 0.85;
}
.mc-city-display {
  font-family: 'Josefin Sans', sans-serif; font-weight: 800;
  text-transform: uppercase; letter-spacing: .06em; line-height: 1.1;
  font-size: 12cqw;
  color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding-right: 8.7cqw;
}
.mc-meta { display: flex; flex-direction: column; gap: 2cqw; }
.mc-dates-display {
  font-size: 6cqw;
  /* bolder + a touch darker so the dates don't blend into the translucent card */
  font-family: var(--sans); color: var(--mc-dates); font-weight: 700; letter-spacing: .01em;
}
.mc-hotel-display {
  font-size: 7.5cqw;
  font-family: var(--sans); color: var(--ink-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.mc-hotel-empty { opacity: 0.28; }

/* BACK face — overflow:hidden while rotated away prevents iOS Safari scroll indicator
   bleeding through the 3D transform onto the front face */
.mc-back {
  transform: rotateY(180deg);
  padding: 4.3cqw 5.3cqw calc(3.35cqw + 22px);
  display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; gap: 0;
  overflow-y: hidden;
  pointer-events: none;
}
.map-stop:not(.mc-dragging):hover .mc-front { pointer-events: none; }
.map-stop:not(.mc-dragging):hover .mc-back,
.map-stop.mc-dragging .mc-back { pointer-events: auto; overflow-y: auto; scrollbar-width: none; }
.map-stop:not(.mc-dragging):hover .mc-back::-webkit-scrollbar,
.map-stop.mc-dragging .mc-back::-webkit-scrollbar { display: none; }

/* back: compact overrides — cqw relative to .map-stop width */
.mc-back .city { font-size: 6.3cqw; letter-spacing: 0; }
.mc-back .head { flex-direction: column; align-items: flex-start; gap: 6.2cqw; width: 100%; margin-bottom: 0; }
.mc-top-row { display: flex; align-items: center; gap: 1.9cqw; width: 100%; }
.mc-top-row .city { flex: 1; min-width: 0; }
.mc-btn-row { display: flex; align-items: center; gap: 1.9cqw; }
.mc-back .iti-btn { width: 11.6cqw; height: 11.6cqw; }
.mc-back .nights input { font-size: 5.8cqw; width: 10.6cqw; }
.mc-back .nights span  { font-size: 4.3cqw; }
/* pin the foot to the bottom of the card face so it's always visible
   regardless of how much content scrolls above it */
.mc-back .foot {
  position: absolute; bottom: 3.35cqw; left: 5.3cqw; right: 5.3cqw;
  background: transparent;   /* card face is uniformly 80% white; no brighter strip */
}

/* editable order number — overlay on SVG pin; scaled via cqi relative to canvas */
.map-pin-num {
  position: absolute; transform: translate(-50%, -50%);
  z-index: 3;
  width: 2.97cqi; height: 2.97cqi; /* 22px / 740px × 100 */
}
.pin-order-input {
  width: 2.97cqi; height: 2.97cqi;
  border-radius: 50%; border: none;
  background: transparent; color: #fff;
  font-size: 1.22cqi; /* 9px / 740px × 100 */
  font-weight: 700; text-align: center;
  cursor: pointer; padding: 0; line-height: 2.97cqi;
  appearance: none; -moz-appearance: textfield;
  font-family: var(--sans);
}
.pin-order-input::-webkit-inner-spin-button,
.pin-order-input::-webkit-outer-spin-button { display: none; }
.pin-order-input:focus {
  outline: none; background: var(--red);
  box-shadow: 0 0 0 0.27cqi oklch(97% 0.005 60), 0 0 0 0.54cqi var(--red);
}

/* compact leg row inside map card back — cqw from .map-stop */
.map-leg-row {
  display: flex; align-items: center; gap: 1.9cqw; flex-wrap: wrap;
  padding: 1.4cqw 0 1.9cqw; margin-top: 0;
}
.map-leg-row .mode-dot { width: 2.9cqw; height: 2.9cqw; border-radius: 50%; flex-shrink: 0; }
.map-leg-row select {
  font-family: var(--sans); font-size: 4.8cqw; font-weight: 500;
  border: 1px solid var(--line); border-radius: var(--r-xs); padding: 1.4cqw 2.4cqw;
  background: var(--surface); color: var(--ink); cursor: pointer; max-width: 36.7cqw;
}
.map-leg-row .dur {
  font-family: var(--sans); font-size: 4.8cqw; color: var(--ink-soft);
  border: none; border-bottom: 1px solid var(--line); background: transparent;
  padding: 1cqw; order: 9; flex-basis: 100%; min-width: 0; outline-offset: 1px;
}
.map-leg-row .cost-wrap { display: inline-flex; align-items: center; gap: 1.4cqw; }
.map-leg-row .cost-wrap--fb { background: var(--gold-soft); border-radius: var(--r-xs); padding: 0 1.9cqw 0 1.4cqw; border: 1px solid var(--gold-border); }
.map-leg-row .cost-wrap--fb .cost { background: transparent; border-color: transparent; color: var(--gold); }
.map-leg-row .cost-wrap--fb .unit { color: var(--gold); font-weight: 600; }
.map-leg-row .cost {
  font-family: var(--sans); font-size: 4.8cqw; width: 21.3cqw;
  border: 1px solid var(--line); border-radius: var(--r-xs); padding: 1.4cqw 1.9cqw;
  background: var(--surface); text-align: right; color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.map-leg-row .unit { font-family: var(--sans); font-size: 4.3cqw; color: var(--ink-mute); }

/* origin / home endpoint labels */
.map-ep {
  position: absolute; z-index: 3;
  display: flex; flex-direction: column; gap: 1px;
  background: var(--ep-glass); border: 1px solid var(--line);
  border-radius: var(--r-sm); padding: 5px 8px;
  backdrop-filter: blur(4px);
}
.map-origin { top: 8px; left: 8px; }
.map-home   { bottom: 8px; right: 8px; }
.map-ep input {
  font-family: var(--sans); font-size: 11px; font-weight: 700; color: var(--ink);
  border: none; background: transparent; padding: 0; min-width: 88px; outline-offset: 2px;
}
.map-ep-date {
  font-family: var(--script); font-style: italic; font-size: 11px; color: var(--ink-soft);
}

/* floating add-stop button on the map */
.map-add-btn {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
  font-family: var(--sans); font-size: 18px; font-weight: 800; line-height: 1;
  color: var(--on-brown); background: var(--brown); border: none; border-radius: var(--r-btn);
  width: 36px; height: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(33,26,24,.28);
  transition: opacity .15s;
}
.map-add-btn:hover  { opacity: .82; }
.map-add-btn:active { opacity: 1; }

/* on very narrow screens, let map scroll horizontally rather than collapse */
@media (max-width: 500px) {
  .map-canvas { min-width: 420px; }
  .map-route { overflow-x: auto; }
}

/* ============================================================
   MOBILE MAP (≤700px) — pins only; tapping a pin pops up that
   stop's card (full info + flip-to-edit, same abilities as the
   desktop card). One popup at a time; closes on tap-away (JS).
   Laptop / full-screen iPad keep the floating-cards design.
   ============================================================ */
@media (max-width: 700px) {
  /* the sole visible card is a popup — full-size type, popover shadow */
  /* compact popup: width (and, since the card's type is all cqw-based, the
     city title / date range / hotel name with it) reduced to ~2/3 so the card
     covers less of the small interactive map */
  .main-cards-overlay .map-stop { width: 123px; animation: mcPopIn .18s ease-out; }
  /* flipped to the edit face → keep the front's compact WIDTH (123px); don't
     shrink the controls, just tighten padding/gaps and let the box grow a touch
     taller to fit them (buttons, nights, trash, title all keep their size).
     Fixed px because at 123px the card's own cqw units would shrink them. */
  .map-stop.mc-editing .mc-flip { aspect-ratio: auto; height: 67px; }
  .map-stop.mc-editing .mc-back { padding: 4px 6px 19px; }
  .map-stop.mc-editing .mc-back .head { gap: 3px; }
  .map-stop.mc-editing .mc-top-row { gap: 5px; }
  .map-stop.mc-editing .mc-btn-row { gap: 5px; }
  .map-stop.mc-editing .mc-back .iti-btn { width: 21px; height: 21px; }
  .map-stop.mc-editing .mc-back .nights input { font-size: 10.5px; width: 20px; }
  .map-stop.mc-editing .mc-back .nights span { font-size: 8px; }
  .map-stop.mc-editing .mc-back .city { font-size: 7.8px; }   /* keep the current compact title size */
  .map-stop.mc-editing .mc-back .foot { bottom: 2px; left: 6px; right: 6px; }
  .main-cards-overlay .map-stop .mc-front,
  .main-cards-overlay .map-stop .mc-back {
    border-color: var(--line-3);
    box-shadow: 0 10px 30px rgba(33,26,24,.28);
  }
  /* no hover-flip on touch (iOS tap-hover is unreliable) — flip only via
     .mc-editing, toggled by tapping the open card. Selectors mirror the
     base hover rules' specificity so source order decides. */
  .map-stop:not(.mc-dragging):hover .mc-flip { transform: none; transition-delay: .18s; }
  .map-stop.mc-editing:not(.mc-dragging) .mc-flip { transform: rotateY(180deg); transition-delay: 0s; }
  .map-stop:not(.mc-dragging):hover .mc-front { pointer-events: auto; }
  .map-stop.mc-editing .mc-front { pointer-events: none; }
  /* overflow:visible (not auto) so the button row can never be clipped by a
     scroll container when the device renders the content a hair taller than the
     box — the content is sized to fit, so nothing actually spills */
  .map-stop.mc-editing .mc-back { pointer-events: auto; overflow: visible; }
  /* popup auto-positions next to its pin — free drag doesn't apply here */
  .mc-back .grip[data-map-drag] { display: none; }
  /* bigger touch pins; the number is editable only while its card is open
     (first tap opens the popup, second tap edits the stop order) */
  .map-pin-main { width: 26px; height: 26px; }
  .map-pin-main .pin-order-input { width: 26px; height: 26px; line-height: 26px; font-size: 11px; pointer-events: none; }
  .map-pin-outer.pin-open .map-pin-main { outline: 2px solid #fff; outline-offset: 1.5px; }
  .map-pin-outer.pin-open .pin-order-input { pointer-events: auto; }
}
@keyframes mcPopIn {
  from { opacity: 0; transform: translateY(6px) scale(.96); }
  to   { opacity: 1; transform: none; }
}
/* taller, more usable map on phones (default 740/480 is too short) */
@media (max-width: 500px) {
  .main-map-wrap { aspect-ratio: 1 / 0.9; }
}
@media (prefers-reduced-motion: reduce) {
  .main-cards-overlay .map-stop { animation: none; }
}

/* ============================================================
   STARTUP / LOADING PAGE — editorial hero above the trip page.
   Editable headline left, transparent wireframe globe right
   (plots the trip's stops, linked). Scrolling slides it up:
   text eases down 0→40px (4px offset), globe rotates 358°.
   ============================================================ */
.intro-lock, .intro-lock body { overflow: hidden !important; }
.intro-overlay {
  position: fixed; inset: 0; z-index: 1500;
  /* matches the page shell so intro + trip page read as one sheet */
  background: var(--shell);
  overflow: hidden;
  touch-action: none;
  will-change: transform;
}
/* fully scrolled: the intro parks (still part of the "big page") — invisible
   and click-through, ready to be pulled back down from the top of the app */
.intro-overlay.intro-parked { visibility: hidden; pointer-events: none; touch-action: auto; }
.intro-inner {
  position: relative; width: 100%; height: 100%;
  padding: 13vh 0 0 6vw;   /* headline sits a little lower down the page */
  overflow: hidden;
}
/* globe sits RIGHT and BIGGER, vertically centred (top/bottom margins match).
   Its right margin (6vw) mirrors the headline's left margin (6vw) so the page
   is evenly framed. The headline is kept to a column on its LEFT so the two
   no longer overlap.
   NOTE: positioning uses top/right only — the scroll driver writes
   `transform: rotate()` on this element, so transform can't hold layout. */
.intro-globe {
  position: absolute;
  right: 6vw;                              /* right margin == headline left margin */
  width: min(94vh, 54vw);                  /* bigger */
  top: calc(50% - min(94vh, 54vw) / 2 - 3vh);   /* lifted a little above centre */
  z-index: 3;
  will-change: transform;
}
.intro-globe svg { display: block; width: 100%; height: auto; }
.intro-text {
  position: relative; z-index: 1;
  /* end the column a small gap before the globe's left edge (globe left edge
     = 100vw - 6vw - globeWidth), so the headline never overlaps the globe.
     gap = (88 - 87)vw = 1vw at this constant (accounts for .intro-inner's
     6vw left padding) — verified by measuring text-right vs globe-left. */
  max-width: calc(87vw - min(94vh, 54vw));
  font-family: var(--serif); font-weight: 400;
  text-transform: uppercase;
  font-size: clamp(20px, 3.4vw, 44px);     /* smaller so it fits the narrower left column */
  line-height: 1.22; letter-spacing: .015em;
  color: var(--ink);
  outline: none; caret-color: var(--red);
  will-change: transform;
}
/* fixed top-right action cluster: undo · sync · memory · theme toggle.
   Lives on <body>, z 1600 — above modals (1000), the modal sticker layer
   (1020), the drag ghost (1200) and the intro overlay (1500) — so it is
   always visible and clickable: intro page, trip page, and open modals. */
.top-actions {
  position: fixed;
  top: max(12px, env(safe-area-inset-top));
  right: max(14px, env(safe-area-inset-right));
  z-index: 1600;
  display: flex; align-items: center; gap: 6px;
}
/* the (intro-only) sync button lives at the TOP-LEFT instead of in the cluster;
   pulling it out of the flex flow leaves undo/memory/theme grouped top-right */
.top-actions .sync-toggle-btn {
  position: fixed;
  top: max(12px, env(safe-area-inset-top));
  left: max(14px, env(safe-area-inset-left));
}
/* app (phone) version: hide the sync-status button. Sync is fully automatic
   (initCloud + realtime + auto push/pull), so hiding the button only removes
   the status pop-up — it does not affect syncing. !important beats the inline
   display updateTopActions() sets. */
@media (max-width: 700px) {
  .top-actions .sync-toggle-btn { display: none !important; }
}
.theme-btn {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent;   /* bare icon, like the tool buttons */
  color: var(--ink-soft); cursor: pointer;
  transition: color .15s;
}
.theme-btn:hover { color: var(--ink); }
.theme-btn .ic-sun { display: none; }                        /* light: show moon */
[data-theme="dark"] .theme-btn .ic-moon { display: none; }   /* dark: show sun  */
[data-theme="dark"] .theme-btn .ic-sun  { display: block; }

/* trip-tab row pinned to the bottom of the intro; scrolls left/right (never
   wraps) so trips overflow to the right. Sits above the transparent globe. */
.intro-tabs {
  position: absolute; left: 0; right: 0; bottom: max(20px, env(safe-area-inset-bottom));
  z-index: 4;
  display: flex; align-items: center; gap: 10px;
  flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden;
  padding: 6px 6vw;
  touch-action: pan-x;                 /* horizontal pan works despite the overlay's touch-action:none */
  scrollbar-width: none;               /* Firefox: hide the scrollbar */
  -ms-overflow-style: none;
}
.intro-tabs::-webkit-scrollbar { display: none; }
/* the "+" stays pinned in front while the tabs scroll behind it */
.intro-tabs .add-trip { position: sticky; left: 0; z-index: 2; background: var(--shell); }
@media (max-width: 700px) {
  /* app version: narrative block on top, globe fully beneath it (no overlap).
     justify-content:flex-end anchors the globe (+ its fixed 3vh gap) to a
     constant position near the bottom of the screen — a longer narrative
     only grows UPWARD into the empty space above, it never pushes the globe
     down or changes the text-globe gap. Bottom padding on .intro-inner
     reserves room so the globe never sits under the .intro-tabs row. */
  .intro-inner { display: flex; flex-direction: column; justify-content: flex-end; padding: 7vh 7vw 100px; }
  .intro-text  { order: 1; position: relative; z-index: 2; max-width: none; font-size: clamp(24px, 7.2vw, 42px); max-height: 56vh; }
  .intro-globe {
    order: 2; position: static; float: none; shape-outside: none;
    top: auto; right: auto;
    width: min(80vw, 48vh);
    margin: 3vh auto 0;           /* fixed gap below the headline — no longer overlaps it */
  }
  .intro-tabs { padding: 6px 7vw; }
}

/* ============================================================
   APP MODE — installed-PWA niceties
   ============================================================ */
html { -webkit-tap-highlight-color: transparent; }

/* installed app: suppress pull-to-refresh / rubber-band chaining */
@media (display-mode: standalone) {
  html, body { overscroll-behavior-y: none; }
}

/* notched phones (viewport-fit=cover): keep content out of the
   sensor housing / home-indicator; env() is 0 elsewhere */
@media (max-width: 799px) {
  .page {
    padding-top: max(16px, env(safe-area-inset-top));
    padding-left: max(12px, env(safe-area-inset-left));
    padding-right: max(12px, env(safe-area-inset-right));
    padding-bottom: calc(60px + env(safe-area-inset-bottom));
  }
  .overlay {
    padding-left: max(20px, env(safe-area-inset-left));
    padding-right: max(20px, env(safe-area-inset-right));
    padding-bottom: max(48px, env(safe-area-inset-bottom));
  }
  .overlay:has(.iti-dialog) {
    padding-left: max(16px, env(safe-area-inset-left));
    padding-right: max(16px, env(safe-area-inset-right));
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }
  .sticker-panel { top: max(88px, calc(env(safe-area-inset-top) + 72px)); }
}

/* ============================================================
   CUSTOM CURSOR — hand-drawn dashed arrow (fine pointers only)
   PNG data-URI so it inlines into the single-file build and works
   in Safari (SVG cursors are unreliable there). Touch / coarse
   devices (the phone app) keep native no-cursor behaviour.
   Appended last so its cursor rules win over earlier grab/pointer

   ============================================================ */
:root { --cur-arrow-img: url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAABo0lEQVR4AeyUv0vDQBTH2ystVWuHGOgPurkI4ig6C9LNXXAp6OLqIgouiiK66qirg5Nu/QccVXSuitI0JaOCNG3q5yRTRbiLJyIkvC/v7vK475fvvTuR+OMvFhA7EDsQO/C/HLAsq1Iul+eLxeIa+QRclUqlV/Jh1AdV2QFILrLZ7DNEdSGEJKz1+/3pZDL5EgTBA+uRQlkAuz+BBKS34L7T6aw4jjPUbDYnWq3WkfwXBcoCer3eNsRvkFTIk+l0epOxD34UygJc121DvI/lYzAek5fy+bzF0azbtj3KWqRQFiB3x+oDRLQhr3EEjVwuV2V9DzfOyJFCSwAM75BvgGFItzj/c9YugXSFpB+6AhKQnuJCHSp5I3zmCzTjbKFQmOI4bNa1QlsAuwcQVsEu48+AfEQIccNEXk+Segj10u8raVB5O66pmANaYUSAZOx2u8tc1VU51oExAfSFC/Ej0ApjAjKZzE4qlbqT/aCjwJgAHBgHjbAflDUYE+D7/iLvw4wyc1hoTIDneQ5vghfuq5yMCVBmHCiMBcQO/LoDAz33ZfoBAAD//0CvMfMAAAAGSURBVAMAlF+PQV5ggZIAAAAASUVORK5CYII=); }
/* dark mode: the ink arrow vanishes on dark surfaces — swap to a white one
   (same shape, inverted). Applies to the custom cursor and the touch arrow. */
[data-theme="dark"] { --cur-arrow-img: url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAABnElEQVR4AeyUvUvDQBjGW/sBKi5qoV+biyCOorMg3dwFl4Iuri6i4KIooquOujo46dZ/wFFF56rUNrU1QyBCSEji70C3onfxRAop78N7H+WeH+/dm4HEP/9igLgCcQXiCvRXBUzTLDebzQXDMNbJp+i61WrZ6CjqB1W6AphdOo7TwKgWBIEwrCaTyZkwDF/Ij6xHCmkATn9GCczu0EM2m10tFAqDpVJpknws9qJIGiCVSu1g/I5JmTzled4W2WP+q5AGyOfzHQwPKPkYjifkZcuyRrn/jW63O8JapJAGEKcDcQhEB/MqV1C3bbvCeJ9qnIv9KFICwNzBcBMNYbpdLBYvML1iLqrCUD2UAMTxmJ4BUmPcIHs8wkU01263p7mOcdaVQhkA0wCICtr7csJ8mNa8ZS7akyQfygC9juZtiO644Srme+1/t6YFQBik0+kVWnVNjFWkDYCrecX4CSmFNgDXdXd9378X70GFQBsAFZhA9c/3IM2gDSCTySzhOouUQhtALpczaM03JXf+rA2AsyJFDBBX4M8r8NPL/AAAAP//tVCE+QAAAAZJREFUAwAmgI9Bb851jgAAAABJRU5ErkJggg==); }
@media (pointer: fine) {
  html, body,
  a, button, select, summary, label,
  [data-act], [data-drag], [data-map-drag], [data-grip-stop],
  .cal-cell, .stop, .map-stop, .grip, .item-grip,
  .todo .box, .outfit, .stock-item, .placed-sticker,
  .opt .choose, .leaflet-container { cursor: var(--cur-arrow-img) 10 11, auto; }
  /* text entry keeps an I-beam so the caret stays findable */
  input:not([type=checkbox]):not([type=radio]):not([type=button]):not([type=submit]):not([type=range]),
  textarea, [contenteditable="true"] { cursor: text; }
}

/* Touch pointer indicator — the same dashed arrow, shown at the fingertip
   on touch devices (iPhone/iPad) since CSS cursors do not apply there.
   Driven by initTouchPointer(); pointer-events:none so it never blocks taps. */
.touch-arrow {
  position: fixed; left: 0; top: 0; z-index: 2147483000;

  // WMO weather-interpretation codes (Open-Meteo `weather_code`) → a small
  // emoji + label set. Grouped into the buckets that read at a glance on a
  // day header; the full code list collapses into ~9 conditions.
  function wxInfo(code) {
    if (code == null) return { icon: '', label: '' };
    if (code === 0) return { icon: '☀️', label: 'Clear' };
    if (code === 1) return { icon: '🌤️', label: 'Mainly clear' };
    if (code === 2) return { icon: '⛅', label: 'Partly cloudy' };
    if (code === 3) return { icon: '☁️', label: 'Overcast' };
    if (code === 45 || code === 48) return { icon: '🌫️', label: 'Fog' };
    if (code >= 51 && code <= 57) return { icon: '🌦️', label: 'Drizzle' };
    if ((code >= 61 && code <= 67) || (code >= 80 && code <= 82)) return { icon: '🌧️', label: 'Rain' };
    if ((code >= 71 && code <= 77) || code === 85 || code === 86) return { icon: '🌨️', label: 'Snow' };
    if (code >= 95) return { icon: '⛈️', label: 'Thunderstorm' };
    return { icon: '', label: '' };
  }
