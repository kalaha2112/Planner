/* styles.css */
/* ============================================================
   EUROPE TRIP PLANNER — Wanderbook-reskinned
   Structure/behaviour from the Europe Trip Planner design spec;
   visual language (type + palette) from the Wanderbook system.
   ============================================================ */

:root {
  /* ---- Wanderbook palette (base) ---- */
  --ink:        #1a1a1a;   /* primary text */
  --ink-mid:    #3d3826;
  --ink-soft:   #7a7260;   /* secondary text */
  --ink-mute:   #a89e8c;   /* muted / placeholder */
  --ink-faint:  #c8c2ae;   /* faintest */
  --brown:      #000000;   /* structural: dark pills, buttons, nodes (was brown #23140C) */
  --red:        #91040C;   /* interactive / active: stops, cash, flight */
  --shell:      #FAFAFA;   /* paper page background */
  --surface:    #FAFAFA;   /* card surface */

  /* ---- retained functional accents ---- */
  --gold:       #C8901F;   /* miles / award / itinerary / links */
  --gold-soft:  #FCF7EC;   /* itinerary button surface */
  --gold-border:#F0E2C9;
  --gold-hover: #F8EFD8;
  --green:      #5E8475;   /* sub-dates, saved, train, chosen */
  --green-dark: #46604F;   /* overnight train */
  --green-bg:   #EAF4EF;

  /* ---- hairlines / borders — a two-tier weight ladder ---- */
  --line:       #000000;   /* STRONG: container frames + title rules */
  --line-soft:  #D9D3C6;   /* QUIET: internal row dividers + input underlines */
  --line-2:     #efeae0;   /* subtle FILL only (hover/active/code bg) — not a line */
  --line-3:     #000000;   /* spine / secondary rules */
  --dash:       #000000;   /* dashed outlines */

  /* ---- calendar / closet warm fills ---- */
  --stay-fill:  #FBEEE9;   /* calendar cell FILL (kept) */
  --stay-line:  #000000;   /* calendar cell border (line) */
  --map-bg:     #EDE7E2;

  /* ---- themed literals (light values; see [data-theme="dark"] below) ---- */
  --on-brown:      #fff;                    /* text/icons on --brown surfaces */
  --hover-soft:    #faf8f4;                 /* accom-btn hover + add-outfit bg */
  --cal-hover:     #F6E0D8;                 /* cal-cell hover + drag-target */
  --rm-hover:      #fef2f2;                 /* .opt .rm:hover */
  --chip-glass:    rgba(255,255,255,.86);   /* outfit/stock delete chips */
  --card-glass:    rgba(255,255,255,.8);    /* .mc-front / .mc-back faces */
  --ep-glass:      rgba(245,242,236,.92);   /* .map-ep chips */
  --map-sea:       #FFFFFF;                 /* main-map container (sea) — white ocean so the paper land stands out */
  --map-land:      #F3EEE4;                 /* main-map geojson land fill — warm paper, not an inkblot (H2) */
  --map-land-line: #C4BAA6;                 /* main-map country borders — legible warm hairline */
  --map-route:     #2A2622;                 /* main-map route polyline — ink line, visible on paper land (H1) */
  --map-label:     #8C8472;                 /* .map-city-label — neutral ink, frees gold for rewards only */
  --mc-dates:      #2c6a37;                 /* .mc-dates-display */
  /* itinerary mini "paper map" SVG */
  --mini-sea:      oklch(95.5% 0.004 70);
  --mini-land:     oklch(91% 0.008 70);
  --mini-border:   oklch(75% 0.01 70);
  --mini-route:    oklch(22% 0.025 70);
  --mini-leader:   oklch(40% 0.012 70);
  --mini-ring:     oklch(97% 0.005 60);

  /* ---- type ---- */
  --serif:  'Playfair Display', Georgia, serif;
  --mono:   ui-monospace, 'SF Mono', Menlo, Consolas, 'Courier New', monospace;   /* receipt */
  --sans:   'Sora', system-ui, sans-serif;
  --caps:   'Bebas Neue', 'DM Sans', sans-serif;
  --script: 'Jost', sans-serif;

  /* ---- radii (from spec) ---- */
  --r-pill: 999px; --r-modal: 18px; --r-card: 13px; --r-cell: 12px;
  --r-btn: 9px; --r-sm: 8px; --r-xs: 7px; --r-check: 6px;
}

/* ============================================================
   DARK THEME — toggled from the intro page (top-right button).
   data-theme="dark" is set on <html> pre-paint by the inline
   boot script in index.html and persisted as
   localStorage['europe-trip-theme-v1'].
   Light surfaces go near-black, black lines/pills go white,
   accents (red/gold/green) brighten slightly.
   ============================================================ */
[data-theme="dark"] {
  /* ink ladder, reversed: ink brightest, faint closest to the bg */
  --ink:        #F2EFE7;
  --ink-mid:    #DCD5C3;
  --ink-soft:   #A9A08E;
  --ink-mute:   #7C7464;
  --ink-faint:  #514C3D;
  --brown:      #FAFAF7;   /* black pills/buttons go white… */
  --on-brown:   #131313;   /* …with dark text on them */
  --red:        #C93A41;   /* brightened from #91040C */
  --shell:      #121210;   /* warm near-black, not pure black */
  --surface:    #161614;

  --gold:       #E0AC3E;   /* brightened from #C8901F */
  --gold-soft:  #2A2315;
  --gold-border:#4D3F1F;
  --gold-hover: #362D1A;
  --green:      #7FA893;   /* brightened from #5E8475 */
  --green-dark: #628268;   /* brightened from #46604F */
  --green-bg:   #1B2721;

  --line:       #FFFFFF;   /* pure-white hairlines mirror the black ones */
  --line-soft:  #3A362E;   /* QUIET divider: dim warm grey, not white */
  --line-2:     #26241F;   /* subtle fill only — stays a fill */
  --line-3:     #FFFFFF;
  --dash:       #FFFFFF;

  --stay-fill:  #2A211D;
  --stay-line:  #FFFFFF;
  --map-bg:     #1E1B18;

  --hover-soft:    #211F1B;
  --cal-hover:     #33241F;
  --rm-hover:      #391B1E;
  --chip-glass:    rgba(28,28,26,.86);
  --card-glass:    rgba(22,22,20,.85);
  --ep-glass:      rgba(28,26,23,.92);
  --map-sea:       #24201C;
  --map-land:      #0B0A09;   /* land stays near-black — a white landmass would
                                 read as a huge light slab inside a dark app */
  --map-land-line: #6A6156;
  --map-route:     #F2EFE7;   /* black route -> warm white */
  --map-label:     #DDBB77;   /* dark-mode map labels reverted to gold (pre-H2) */
  --mc-dates:      #8CC49A;
  --mini-sea:      #14120F;
  --mini-land:     #201D19;
  --mini-border:   #4B453C;
  --mini-route:    #F2EFE7;
  --mini-leader:   #A9A08E;
  --mini-ring:     #121210;

  color-scheme: dark;   /* native scrollbars, inputs, date pickers */
}
/* route-modal OSM tiles: soft-invert to a dark basemap. :not(.daymap) because
   the day-plan map also carries .map and has its own theme treatment below. */
[data-theme="dark"] .map:not(.daymap) .leaflet-tile-pane {
  filter: invert(1) hue-rotate(180deg) saturate(.45) brightness(.9) contrast(.92);
}
[data-theme="dark"] .leaflet-bar a {
  background: var(--surface); color: var(--ink); border-color: var(--ink-faint);
}
[data-theme="dark"] .leaflet-control-attribution {
  background: rgba(18,18,16,.7); color: var(--ink-mute);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { background: var(--shell); height: 100%; }
body {
  font-family: var(--sans);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-y: auto; /* scrolls on small screens; overridden to hidden on wide */
}

button { font-family: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }
input::placeholder, textarea::placeholder { color: var(--ink-mute); }
a { color: inherit; }
:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }
.tab-active input:focus-visible { outline: none; }


/* ============================================================
   PAGE SHELL
   ============================================================ */
.page {
  max-width: 1360px;
  margin: 0 auto;
  padding: 14px 20px 10px;
  color: var(--ink);
}

.body-cols {
  display: flex; flex-wrap: wrap; gap: 22px; align-items: flex-start;
}

.saved {
  font-family: var(--script); font-style: italic; font-weight: 300; font-size: 13px;
  color: var(--green); margin-left: auto;
  transition: opacity .5s ease;
}
.toolbar { display: flex; gap: 6px; align-items: center; }
.tool-btn {
  display: flex; align-items: center; justify-content: center;
  width: 34px; height: 34px;
  border: none; background: transparent;
  border-radius: var(--r-btn); cursor: pointer; color: var(--ink-soft);
  transition: color .15s;
}
.tool-btn:hover { color: var(--ink); }
.tool-btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
.toolbar-divider {
  width: 1px;
  height: 22px;
  background: var(--line-soft);   /* quiet divider */
  margin: 0 2px;
  flex-shrink: 0;
}
.sticker-toggle-btn {
  background: transparent !important;
  color: var(--ink-soft) !important;
  border: none !important;
  transition: color .15s;
}
.sticker-toggle-btn:hover {
  background: transparent !important;
  color: var(--gold) !important;
  box-shadow: none;
}
.sticker-toggle-btn.active {
  background: transparent !important;
  color: var(--gold) !important;
  border: none !important;
}

/* ============================================================
   TRIP SWITCHER
   ============================================================ */
.tabs {
  display: inline-flex; gap: 3px; flex-shrink: 0;
}
.tab-active {
  display: inline-flex; align-items: center; flex-shrink: 0;
  background: var(--brown); border-radius: var(--r-pill);
  cursor: grab;
}
.tab-active input {
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  padding: 8px 4px 8px 16px; border: none; background: transparent;
  color: var(--on-brown); cursor: text; outline-offset: 2px;
}
.tab-x {
  display: flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; margin-right: 6px;
  border: none; background: transparent; color: var(--on-brown); opacity: .7;
  cursor: pointer; font-family: var(--sans); font-size: 17px; font-weight: 800;
  line-height: 1; padding: 0;
}
.tab-inactive {
  font-family: var(--sans); font-size: 13px; font-weight: 600; flex-shrink: 0;
  padding: 8px 18px; border-radius: var(--r-pill); border: none;
  background: transparent; color: var(--ink-soft); cursor: grab;
}
.add-trip {
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  width: 34px; height: 34px; border: 1px dashed var(--dash);
  background: transparent; border-radius: var(--r-pill); cursor: pointer;
  color: var(--ink-soft); font-family: var(--sans); font-size: 20px;
  font-weight: 800; line-height: 1;
}

/* ============================================================
   TRIP META
   ============================================================ */
.meta-row { display: flex; gap: 22px; flex-wrap: wrap; align-items: flex-end; margin: 0 0 8px; }
.meta-field { display: flex; flex-direction: column; gap: 3px; }
.meta-field label {
  font-family: var(--sans); font-size: 10px; letter-spacing: .06em;
  text-transform: uppercase; color: var(--ink-mute);
}
.meta-field input {
  font-family: var(--sans); font-size: 13px; color: var(--ink);
  border: none; border-bottom: 1px solid var(--line-soft);
  background: transparent; padding: 3px 0;
}
.meta-field.travelers input { width: 50px; }
.travelers-pip { display: flex; flex-direction: row; align-items: center; gap: 2px; min-height: 24px; padding-bottom: 8px; transform: translateY(-0.1px); }
.traveler-icon { background: none; border: none; padding: 0; cursor: pointer; color: var(--ink-soft); opacity: 0.85; line-height: 0; }
.traveler-icon:hover { color: var(--red); opacity: 1; }
[data-theme="dark"] .traveler-icon { color: var(--ink); opacity: 1; }   /* white in dark mode */
.traveler-add { background: none; border: 1px dashed var(--ink-faint); border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 12px; line-height: 1; cursor: pointer; color: var(--ink-faint); padding: 0; }
.traveler-add:hover { border-color: var(--ink-soft); color: var(--ink-soft); }

/* ============================================================
   ROUTE (left column)
   ============================================================ */
.route { flex: 1 1 460px; min-width: 300px; position: relative; }
.route-spine {
  position: absolute; left: 14px; top: 14px; bottom: 30px; width: 2px;
  pointer-events: none;
}
.route-spine svg { width: 6px; height: 100%; overflow: visible; }
.route-spine path { stroke: var(--line-3); stroke-width: 2; fill: none; }

/* endpoint (origin / home) */
.endpoint { position: relative; padding: 12px 0 12px 40px; }
.endpoint .node {
  position: absolute; left: 8px; top: 15px; width: 13px; height: 13px;
  border-radius: 50%; background: var(--surface); border: 2px solid var(--brown);
  box-sizing: border-box;
}
.endpoint .row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.endpoint input {
  font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--ink);
  border: none; background: transparent; padding: 2px 0; min-width: 130px; outline-offset: 3px;
}
.endpoint .date { font-family: var(--script); font-style: italic; font-size: 14px; color: var(--ink-soft); align-self: flex-end; }

/* leg */
.leg { position: relative; padding: 0 0 0 40px; }
.leg .inner { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 7px 0; }
.leg select {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  border: 1px solid var(--line); border-radius: var(--r-xs); padding: 5px 8px;
  background: var(--surface); color: var(--ink); cursor: pointer;
}
.leg .dur {
  font-family: var(--sans); font-size: 12px; color: var(--ink-soft);
  border: none; border-bottom: 1px solid var(--line-soft); background: transparent;
  padding: 4px 2px; flex: 1; min-width: 110px; outline-offset: 2px;
}
.leg .cost-wrap { display: inline-flex; align-items: center; gap: 5px; }
.leg .cost-wrap--fb { background: var(--gold-soft); border-radius: var(--r-xs); padding: 0 5px 0 3px; border: 1px solid var(--gold-border); }
.leg .cost-wrap--fb .cost { background: transparent; border-color: transparent; color: var(--gold); }
.leg .cost-wrap--fb .unit { color: var(--gold); font-weight: 600; }
.leg .cost {
  font-family: var(--sans); font-size: 12px; width: 62px;
  border: 1px solid var(--line); border-radius: var(--r-xs); padding: 5px 6px;
  background: var(--surface); text-align: right; color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.leg .unit { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); min-width: 34px; }
.leg .mode-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.insert {
  font-family: var(--sans); font-size: 16px; font-weight: 700; line-height: 1;
  color: var(--ink-mute); border: 1px dashed var(--dash); background: transparent;
  border-radius: var(--r-xs); padding: 3px 9px; cursor: pointer;
}

/* stop card */
.stop { position: relative; padding: 6px 0 4px 40px; transition: opacity .15s; contain: layout; }
.stop .dot {
  position: absolute; left: 5px; top: 27px; width: 19px; height: 19px;
  border-radius: 50%; background: var(--red); border: 3px solid var(--shell);
  box-sizing: border-box;
}
.card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-card); padding: 11px 16px 11px;
  box-shadow: 0 1px 2px rgba(33,26,24,.04);
}
.stop .head { display: flex; align-items: center; gap: 10px; }
.stop .city {
  font-family: 'Josefin Sans', sans-serif; font-size: 36px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase; color: var(--ink);
  border: none; background: transparent; padding: 0; flex: 1; min-width: 0; outline-offset: 3px;
}
.iti-btn {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; color: var(--gold);
  border: 1px solid var(--gold-border); background: var(--gold-soft);
  border-radius: var(--r-sm); cursor: pointer; transition: background .15s;
}
.iti-btn:hover { background: var(--gold-hover); }
.nights { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
.nights input {
  width: 26px; border: none; background: transparent; font-family: var(--sans);
  font-weight: 700; font-size: 13px; color: var(--ink); text-align: right; padding: 0;
  font-variant-numeric: tabular-nums; appearance: textfield; -moz-appearance: textfield;
}
.nights input::-webkit-inner-spin-button,
.nights input::-webkit-outer-spin-button { display: none; }
.nights span { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); }
.stop .subdate { font-family: 'Jost', sans-serif; font-style: italic; font-weight: 300; font-size: 14px; color: var(--green); margin: 1px 0 6px; }
.accom-btn {
  display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
  border: none; background: transparent; border-radius: var(--r-xs);
  padding: 4px 4px; margin-left: -4px; cursor: pointer; transition: background .15s;
}
.accom-btn:hover { background: var(--hover-soft); }
.accom-btn .lbl { flex: 1; min-width: 0; font-family: var(--sans); font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.accom-btn .chev { flex-shrink: 0; font-family: var(--sans); font-size: 11px; color: var(--ink-faint); font-weight: 700; }
.stop .foot { display: flex; align-items: flex-end; gap: 4px; margin-top: 2px; }
.grip {
  display: flex; align-items: flex-end; justify-content: center;
  width: 34px; height: 20px; cursor: grab; color: var(--ink-faint); flex-shrink: 0;
  margin: 0 0 0 -8px;                  /* usable touch target, minimal added card height */
  touch-action: none; opacity: .7;     /* quiet, matching the trash icon */
  position: relative; top: -1px;        /* align dots' bottom with the trash glyph bottom */
}
.grip:hover { opacity: 1; color: var(--ink-soft); }
.grip:active { cursor: grabbing; }
.grip svg { display: block; }
/* pointer-drag reorder feedback */
.stop.dragging { z-index: 6; opacity: .97; will-change: transform; transform: translateZ(0); }
.stop.dragging > .card { box-shadow: 0 5px 14px rgba(33,26,24,.16); border-color: var(--red); }
.stop.drop-before:not(.dragging) > .card { box-shadow: 0 -3px 0 -1px var(--red), 0 1px 2px rgba(33,26,24,.04); }
.stop.drop-after:not(.dragging) > .card { box-shadow: 0 3px 0 -1px var(--red), 0 1px 2px rgba(33,26,24,.04); }
.trash {
  display: flex; align-items: flex-end; justify-content: center; width: 18px; height: 20px;
  color: var(--ink-faint); border: none; background: transparent; cursor: pointer;
  margin-left: auto; border-radius: var(--r-check); transition: color .15s; opacity: .7;
}
.trash svg { width: 13px; height: 13px; display: block; }
.trash:hover { color: var(--red); opacity: 1; }
.grip:hover { opacity: 1; }

.add-stop {
  font-family: var(--sans); font-size: 22px; font-weight: 800; line-height: 1;
  color: var(--on-brown); background: var(--brown); border: none; border-radius: var(--r-btn);
  width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity .15s;
}
.add-stop:hover { opacity: .80; }
.add-stop:active { opacity: 1; }
.add-stop-wrap { padding-left: 40px; margin-top: 22px; }

/* ============================================================
   ASIDE (right column)
   ============================================================ */
.aside { flex: 0 1 280px; min-width: 240px; display: flex; flex-direction: column; gap: 16px; }

.map {
  height: 264px; width: 100%; border-radius: var(--r-card);
  border: 1px solid var(--line); overflow: hidden; background: var(--map-bg);
}
/* harmonise OSM tiles with the paper aesthetic */
.map .leaflet-tile-pane { filter: saturate(.62) sepia(.12) brightness(1.02) contrast(.96); }
.map .leaflet-container { background: var(--map-bg); font-family: var(--sans); }
.map-note { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); padding: 0 2px; line-height: 1.4; }

.summary { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); padding: 12px 18px; }
.stat { padding: 13px 0; border-bottom: 1px solid var(--line-soft); }
.stat:last-child { border-bottom: none; }
/* nights stat split into two halves: left = nights, right = travellers */
.stat.stat-split { display: flex; padding: 0; }
/* size each half to its content (not flex:1) so the nights half doesn't
   stretch to fill the row, leaving a big empty gap before the divider */
.stat-split .stat-half { flex: 0 0 auto; padding: 13px 24px 13px 0; min-width: 0; }
/* nights half's trailing whitespace before the divider */
.stat-split .stat-half:first-child { padding-right: 68px; }
.stat-split .stat-half + .stat-half { border-left: 1px solid var(--line-soft); padding-left: 18px; }
/* travellers half shrinks to its icons so the nights half takes the extra width */
.stat-split .stat-travelers { flex: 0 0 auto; display: flex; align-items: center; }
.stat-travelers .travelers-pip { min-height: 38px; padding-bottom: 0; align-items: center; flex-wrap: wrap; }
.stat.clickable { cursor: pointer; }
.stat .fig { font-family: var(--caps); font-size: 42px; letter-spacing: .02em; color: var(--ink); line-height: .9; }
.stat.cash .fig  { color: var(--red); }
.stat.miles .fig { color: var(--gold); }
.stat.miles.covered .fig { color: var(--green); }
.stat.miles.covered .cap::after { content: ' ✓'; color: var(--green); }
.stat .cap { font-family: var(--sans); font-size: 11px; font-weight: 500; letter-spacing: .06em; color: var(--ink-mid); margin-top: 6px; text-transform: uppercase; }

.todos { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); padding: 17px 18px; }
.todos .hd { display: flex; align-items: baseline; gap: 8px; margin-bottom: 13px; }
.todos .hd .t { font-family: var(--sans); font-size: 14px; font-weight: 700; color: var(--ink); }
.todos .hd .p { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); margin-left: auto; font-variant-numeric: tabular-nums; }
.todo { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.todo .box {
  flex-shrink: 0; width: 19px; height: 19px; border-radius: var(--r-check);
  border: 1.5px solid var(--dash); background: var(--surface); color: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
}
.todo .box.done { background: var(--green); border-color: var(--green); }
.todo input.txt { flex: 1; min-width: 0; font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--ink); border: none; background: transparent; padding: 2px 0; outline-offset: 2px; }
.todo input.txt.done { color: var(--ink-mute); text-decoration: line-through; text-decoration-color: var(--green); animation: strikeThrough .3s cubic-bezier(0.16,1,0.3,1) both; }
.todo .x { flex-shrink: 0; font-family: var(--sans); font-size: 12px; line-height: 1; color: var(--ink-faint); border: none; background: transparent; cursor: pointer; padding: 4px; }
.add-todo {
  font-family: var(--sans); font-size: 18px; font-weight: 800; line-height: 1;
  color: var(--ink); background: transparent; border: 1px dashed var(--dash);
  border-radius: var(--r-sm); padding: 7px 14px; cursor: pointer; margin-top: 12px; width: 100%;
}

/* ============================================================
   MODALS (shared chrome)
   ============================================================ */
.overlay {
  position: fixed; inset: 0;
  /* ombre glass: a translucent gradient tint over a frosted blur of the page */
  background: linear-gradient(155deg, rgba(28,24,20,.26) 0%, rgba(20,17,14,.50) 100%);
  backdrop-filter: blur(14px) saturate(1.15);
  -webkit-backdrop-filter: blur(14px) saturate(1.15);
  z-index: 1000;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 48px 20px; overflow-y: auto;
}
/* sync modal can be opened from the top-actions cluster while the intro is
   still up, so it must sit above the intro overlay (1500), below top-actions (1600) */
.overlay[data-act="overlay-sync"] { z-index: 1550; }
.dialog {
  background: var(--shell); width: 100%; border-radius: var(--r-modal);
  box-shadow: 0 24px 70px rgba(35,20,12,.28); overflow: hidden;
}
.dialog .head { padding: 24px 30px 20px; background: var(--surface); border-bottom: 1px solid var(--line); }
.dialog .head .row { display: flex; align-items: flex-start; gap: 14px; }
.eyebrow {
  font-family: var(--caps); font-size: 13px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--gold); line-height: 1; margin-bottom: 8px;
}
.modal-x {
  font-family: var(--sans); font-size: 18px; line-height: 1; color: var(--ink-mute);
  border: 1px solid var(--line); background: var(--surface); border-radius: var(--r-btn);
  padding: 8px 12px; cursor: pointer; flex-shrink: 0;
}
@keyframes strikeThrough { from { text-decoration-color: transparent; } to { text-decoration-color: var(--green); } }

/* ---- Itinerary modal ---- */
.overlay:has(.iti-dialog) { padding: 20px 16px; }
.iti-dialog {
  max-width: 1500px;
  height: calc(100vh - 40px);
  display: flex;
  flex-direction: column;
}
.iti-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.iti-left {
  flex: 0 0 40%;
  width: auto;
  overflow-y: auto;
  padding: 0 28px 28px;
  border-right: 1px solid var(--line);
}
.iti-right {
  flex: 1;
  overflow-y: auto;
  padding: 24px 30px 32px;
  animation: slideRight .24s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: translateX(0); }
}
.iti-city { font-family: var(--serif); font-size: 29px; font-weight: 700; letter-spacing: -.01em; color: var(--ink); border: none; background: transparent; padding: 0; width: 100%; }
.iti-sub { font-family: var(--script); font-style: italic; font-size: 14px; color: var(--green); margin-top: 4px; }

.cal { margin-top: 18px; }
.cal-month { margin-bottom: 6px; }
.cal-month .label { font-family: var(--sans); font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 10px; letter-spacing: -.01em; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.cal-dow { text-align: center; font-family: var(--sans); font-size: 10px; font-weight: 600; letter-spacing: .05em; color: var(--ink-mute); padding: 2px 0; }
.cal-off { height: auto; display: flex; align-items: flex-start; justify-content: center; padding-top: 8px; font-family: var(--sans); font-size: 12px; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
.cal-cell {
  position: relative; min-height: 120px; border-radius: var(--r-cell);
  background: var(--stay-fill); color: var(--ink-soft);
  font-family: var(--script); font-style: italic; font-weight: 300; font-size: 19px; letter-spacing: .01em;
  cursor: pointer; display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 0; overflow: hidden; width: 100%;
  border: 1px solid var(--stay-line); transition: background .15s;
}
.cal-cell:hover { background: var(--cal-hover); }
.cal-cell.active {
  border: 3px solid var(--brown); color: var(--ink);
  transform: scale(1.05); box-shadow: 0 6px 20px rgba(35,20,12,.2);
  z-index: 1;
}
.cal-cell img { width: 100%; flex: 1; min-height: 0; object-fit: contain; object-position: center; margin-top: 2px; margin-bottom: 6px; pointer-events: none; }
/* app (phone): the calendar is 7 narrow columns, so a `contain` outfit thumbnail
   shrinks to a dot inside a tall cell. Shorten the cell and let the outfit fill
   the width below the day number (kept in normal flow, so it never overlaps). */
@media (max-width: 700px) {
  .cal-cell { min-height: 76px; padding: 5px 3px 4px; font-size: 12px; }
  .cal-cell img { object-fit: cover; border-radius: 5px; margin-top: 3px; margin-bottom: 0; }
}

.iti-foot { padding: 0; }
.day-title { font-family: var(--script); font-style: italic; font-weight: 300; font-size: 18px; color: var(--ink); margin-bottom: 16px; }
.day-prompt { padding: 26px 30px 32px; text-align: center; }
.day-prompt p, .empty-note { font-family: var(--sans); font-size: 13px; color: var(--ink-mute); }

/* padding + compensating negative margin: unselected rows still align flush
   with .add-item and other day-main content, but .item.selected/.flash's
   own rounded box gets breathing room instead of content touching its edge */
.item { display: flex; gap: 12px; align-items: flex-start; padding: 11px 12px; margin: 0 -12px; border-bottom: 1px solid var(--line); }
.item-grip {
  flex-shrink: 0; width: 20px; height: 22px; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint); cursor: grab; touch-action: none; opacity: .75;
  border-radius: var(--r-xs); transition: background .15s, color .15s, opacity .15s;
}
.item-grip:hover { opacity: 1; color: var(--ink-soft); background: var(--line-2); }
.item-grip:active { cursor: grabbing; }
.item-grip svg { display: block; }
/* pointer-drag feedback when moving an activity onto another day */
.item.drag-source, .cal-cell.drag-source { opacity: .4; }
.cal-cell.drag-target { outline: 3px solid var(--red); outline-offset: -2px; background: var(--cal-hover); }
/* let the touch pointer-drag run on outfits without the page scrolling it away.
   Touch-only — the web's native mouse drag is unaffected. */
.cal-cell[data-drag="cell"], .outfit[data-drag="closet"] { touch-action: none; }
.drag-ghost {
  position: fixed; z-index: 1200; pointer-events: none;
  transform: translate(-50%, -150%);
  max-width: 220px; padding: 7px 12px; border-radius: 8px;
  background: var(--brown); color: var(--on-brown);
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  box-shadow: 0 4px 14px rgba(35,20,12,.3);
}
.item .mid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.item .text { font-family: var(--sans); font-size: 14px; color: var(--ink); border: none; background: transparent; padding: 4px 0; width: 100%; outline-offset: 2px; }
.item .meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.item .field { flex: 1; display: flex; align-items: center; gap: 5px; min-width: 120px; }
.item .field > svg { color: var(--ink-mute); }   /* icons use currentColor -> theme-aware */
.item .field input { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); border: none; background: transparent; padding: 2px 0; flex: 1; min-width: 0; outline-offset: 2px; }
.item .maps { flex-shrink: 0; display: flex; align-items: center; color: var(--gold); text-decoration: none; font-family: var(--sans); font-size: 11px; font-weight: 700; }
.item .cost-field { flex: 0 1 72px; display: flex; align-items: center; gap: 3px; }
.item .cost-field .d { font-family: var(--sans); font-size: 10px; font-weight: 500; color: var(--ink-mute); flex-shrink: 0; }
.item .cost-field input { font-family: var(--sans); font-size: 10.5px; color: var(--ink-soft); border: none; background: transparent; padding: 2px 0; width: 100%; min-width: 0; font-variant-numeric: tabular-nums; }
.item .x { font-family: var(--sans); font-size: 13px; line-height: 1; color: var(--ink-faint); border: none; background: transparent; cursor: pointer; padding: 5px; flex-shrink: 0; }
.add-item, .add-option {
  font-family: var(--sans); font-size: 18px; font-weight: 800; line-height: 1;
  color: var(--ink); background: transparent; border: 1px dashed var(--dash);
  border-radius: var(--r-btn); padding: 7px 16px; cursor: pointer; margin-top: 16px;
}

/* ---- day-plan route optimizer ---- */
.day-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.day-head .day-title { margin-bottom: 0; }
/* weather chip on the day header — forecast (or typical, muted) for the date */
.day-wx { display: inline-flex; align-items: baseline; gap: 5px; flex-shrink: 0;
  font-family: var(--sans); font-size: 12px; line-height: 1; color: var(--ink); }
.day-wx .ic { font-size: 14px; line-height: 1; }
.day-wx .tmp { font-weight: 600; letter-spacing: .01em; }
.day-wx .lo { font-weight: 400; color: var(--ink-mute); margin-left: 1px; }
.day-wx.typical { color: var(--ink-mute); }
.day-wx.typical .tmp { font-weight: 500; }
.optimize-btn {
  margin-left: auto; flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--sans); font-size: 12px; font-weight: 600; letter-spacing: .01em;
  color: var(--gold); background: var(--gold-soft);
  border: 1px solid var(--gold-border); border-radius: var(--r-pill);
  padding: 6px 13px 6px 11px; cursor: pointer; transition: background .15s, box-shadow .15s;
}
.optimize-btn:hover:not(:disabled) { background: var(--gold-hover); box-shadow: 0 2px 8px rgba(35,20,12,.1); }
.optimize-btn:disabled { opacity: .45; cursor: not-allowed; }
.optimize-btn svg { fill: currentColor; stroke: none; }

.optimize-note {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--green-bg); border: 1px solid color-mix(in oklch, var(--green) 24%, transparent);
  border-radius: var(--r-sm); padding: 10px 12px; margin-bottom: 14px;
  font-family: var(--sans); font-size: 12px; line-height: 1.45; color: var(--ink-mid);
}
.optimize-note.warn { background: var(--gold-soft); border-color: var(--gold-border); }
.optimize-note span { flex: 1; min-width: 0; }
.optimize-note .on-x { flex-shrink: 0; border: none; background: transparent; color: var(--ink-mute); cursor: pointer; font-size: 12px; line-height: 1; padding: 2px; }

/* ---- per-day focused map (inside the day column of the itinerary modal) ---- */
.day-cols { display: flex; gap: 22px; align-items: flex-start; }
.day-main { flex: 1; min-width: 0; }
.day-aside { flex: 0 0 260px; position: sticky; top: 4px; display: flex; flex-direction: column; gap: 7px; }
.daymap { height: 340px; }
/* Grainy high-contrast B&W satellite look, themed:
   · LIGHT theme — the exact INVERSE: white ground, black streets (the base
     filter below already produces pure black/white, so appending invert(1)
     is lossless).
   · DARK theme — the original night-satellite look: black city blocks,
     streets reading as light veins (city lights from orbit). */
.daymap.map.leaflet-container { background: #f2f0ec; }   /* unloaded tile area, light */
[data-theme="dark"] .daymap.map.leaflet-container { background: #0a0a0a; }
/* brighten so the land/street midpoint lands on the contrast pivot, then hard
   contrast splits them. Verified numerically on dark-matter tones: land and
   water clip to pure black (0), all street classes + labels saturate to pure
   white (255), and anti-aliased street edges land ~178 — so lines keep a
   bright halo and read whiter AND thicker. (No blur — blurring 1px lines
   drops their peak below the pivot and the contrast crushes them to black.) */
/* …then feMorphology dilate (defined in index.html) rebuilds each street line
   from its pure-white core outward: white edge-to-edge and ~1.5px bolder.
   Unlike blur, dilation has no threshold that can drop a thin line. */
.daymap.map .leaflet-tile-pane { filter: saturate(0) brightness(2.8) contrast(8) url(#daymap-dilate) invert(1); }
[data-theme="dark"] .daymap.map .leaflet-tile-pane { filter: saturate(0) brightness(2.8) contrast(8) url(#daymap-dilate); }
/* Web-only labels ride in their own pane (see ensureDayMap) so the street-line
   dilate above never touches the text. Gently whiten, then invert(1) in light
   theme so the names come out dark on the white ground; dark theme keeps the
   whitened text on black. NO dilate, NO hard contrast — names stay thin. */
.daymap.map .leaflet-daylabels-pane { filter: saturate(0) brightness(1.7) contrast(1.15) invert(1); }
[data-theme="dark"] .daymap.map .leaflet-daylabels-pane { filter: saturate(0) brightness(1.7) contrast(1.15); }
/* film-grain overlay above the tiles, below the pins (Leaflet marker pane is z 600) */
.daymap.map::after {
  content: ''; position: absolute; inset: 0; z-index: 450; pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  opacity: .07; mix-blend-mode: multiply;   /* dark speckle on the light ground */
}
[data-theme="dark"] .daymap.map::after {
  opacity: .09; mix-blend-mode: screen;     /* light speckle, like sensor noise */
}
/* WEB (wide) ONLY: the day map keeps the NIGHT look — black map, white streets
   — in BOTH light and dark themes; it never inverts to the light version (the
   app <=700px still follows the theme). Uses the lighter dilate so the bold
   grid doesn't overwhelm the labels. Placed LAST so it wins on source order,
   and each rule also lists a [data-theme="dark"] variant to match the dark
   base rules' specificity and override them for web. */
@media (min-width: 701px) {
  .daymap.map.leaflet-container,
  [data-theme="dark"] .daymap.map.leaflet-container { background: #0a0a0a; }
  .daymap.map .leaflet-tile-pane,
  [data-theme="dark"] .daymap.map .leaflet-tile-pane { filter: saturate(0) brightness(2.8) contrast(8) url(#daymap-dilate-soft); }
  .daymap.map .leaflet-daylabels-pane,
  [data-theme="dark"] .daymap.map .leaflet-daylabels-pane { filter: saturate(0) brightness(1.7) contrast(1.15); }
  .daymap.map::after,
  [data-theme="dark"] .daymap.map::after { opacity: .09; mix-blend-mode: screen; }
}
.daymap-cap { font-family: var(--sans); font-size: 10.5px; color: var(--ink-mute); line-height: 1.4; padding: 0 1px; }

/* activity number badge (matches its map pin) */
.item-num {
  flex-shrink: 0; width: 22px; height: 22px; margin-top: 1px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--sans); font-size: 11px; font-weight: 700; line-height: 1;
  color: #fff; font-variant-numeric: tabular-nums;
  background: var(--red);
}
.item-num.placed { background: var(--red); }
.item-num:not(.placed):not(.empty) { background: var(--ink-faint); }  /* has address, locating */
.item-num.empty { background: transparent; color: var(--ink-faint); border: 1.5px solid var(--line); }

.map-stop-dot { cursor: pointer; }

/* numbered Leaflet divIcon pin — teardrop shape */
.day-pin {
  display: flex; align-items: center; justify-content: center;
  filter: drop-shadow(0 2px 6px rgba(145,4,12,.30));
}
.day-pin span {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  background: var(--red); color: #fff;
  font-family: var(--sans); font-size: 11px; font-weight: 700; line-height: 1;
}
.day-pin span::after {
  content: attr(data-n);
  transform: rotate(45deg);
  display: block;
}

/* chosen-hotel "home base" pin — white teardrop with a bed glyph, distinct
   from the numbered red activity pins; icon is counter-rotated to sit upright */
.day-pin-hotel { filter: drop-shadow(0 2px 6px rgba(0,0,0,.45)); }
.day-pin-hotel span { background: #fff; }
.day-pin-hotel span::after { content: none; }
.day-pin-hotel span svg { transform: rotate(45deg); display: block; }

/* click-a-pin highlight on the matching activity row */
.item.selected { background: rgba(145,4,12,.07); border-radius: 6px; outline: 1.5px solid rgba(145,4,12,.22); }
.item.flash { animation: itemFlash 1.3s ease; }
@keyframes itemFlash { 0% { background: rgba(145,4,12,.14); } 100% { background: transparent; } }

/* active (selected) pin — slightly larger + white border ring */
.day-pin.active { filter: drop-shadow(0 2px 8px rgba(145,4,12,.55)); }
.day-pin.active span { width: 32px; height: 32px; outline: 2.5px solid var(--ink); outline-offset: 1px; }
[data-theme="dark"] .day-pin.active span { outline-color: #fff; }

/* stack the map above the activity list when the day column gets narrow */
@media (max-width: 900px) {
  .day-cols { flex-direction: column-reverse; }
  .day-aside { position: static; flex-basis: auto; width: 100%; }
  .daymap { height: 260px; }
}

/* closet strip (in itinerary header) */
.closet { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
.closet .hd { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.closet .hd .t { font-family: var(--sans); font-size: 12px; font-weight: 700; color: var(--ink); }
.closet .hd .hint { font-family: var(--sans); font-size: 11px; color: var(--ink-mute); }
.closet .strip { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-start; }
.outfit {
  position: relative; width: 52px; height: 62px; border-radius: var(--r-btn);
  overflow: hidden; cursor: grab; flex-shrink: 0;
}
.outfit img { width: 100%; height: 100%; object-fit: contain; }
.outfit .del { position: absolute; bottom: 2px; right: 2px; width: 15px; height: 15px; border-radius: 50%; border: none; background: var(--chip-glass); color: var(--ink-soft); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; line-height: 1; padding: 0; }
.add-outfit {
  width: 52px; height: 62px; border: 2px dashed var(--dash); border-radius: var(--r-btn);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  cursor: pointer; background: var(--hover-soft); outline: none; flex-shrink: 0;
}
.add-outfit span { font-family: var(--sans); font-size: 10px; color: var(--ink-mute); }
.add-outfit svg { color: var(--gold); }   /* icons use currentColor -> theme-aware */

/* ---- Budget modal ---- */
/* ============================================================
   BUDGET MODAL — printed receipt. Paper feeds out of a printer
   slot (stepped translate = dot-matrix ratchet), monochrome
   monospace ink, dashed rules, torn bottom edge, fake barcode.
   ============================================================ */
.receipt-wrap { width: 100%; max-width: 380px; }
.printer-slot {   /* silver-white printer housing */
  position: relative; z-index: 2;
  height: 38px; border-radius: 11px;
  background: linear-gradient(180deg, #fbfbfc, #e3e5e8 40%, #c9ccd1 62%, #edeff1);
  border: 1px solid #b7babf;
  box-shadow: 0 4px 10px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.95), inset 0 -1px 0 rgba(0,0,0,.08);
}
.printer-slot::before {   /* the dark feed slit the paper rolls out of */
  content: ''; position: absolute; left: 5px; right: 5px; top: 17px;
  height: 14px;
  border-radius: 7px;
  background: linear-gradient(180deg, #050505, #232323);
  box-shadow: inset 0 3px 4px rgba(0,0,0,.9), inset 0 -1px 1px rgba(255,255,255,.16);
}
.printer-slot::after {   /* little status LED, on the face above the slit */
  content: ''; position: absolute; right: 15px; top: 6px;
  width: 5px; height: 5px; border-radius: 50%;
  background: #46c95c; box-shadow: 0 0 5px #46c95c, inset 0 0 1px rgba(0,0,0,.35);
}
/* The clip's top edge sits at the slit's centerline (-14px into the 38px
   housing) and stacks ABOVE the housing, so the paper is cut off exactly at
   the dark opening and hangs over the housing's lower lip — reading as the
   sheet rolling out of the slot rather than sliding from under the bar. */
.receipt-clip { overflow: hidden; padding: 0 8px 30px; margin: -14px -8px 0; position: relative; z-index: 3; }
.budget-dialog {
  position: relative;
  /* paper 0.5px narrower than the BLACK feed slit (which is inset 5px each
     side of the housing), so the sheet feeds through just inside the slot */
  width: calc(100% - 10.5px); margin-left: auto; margin-right: auto;
  max-width: none; border-radius: 0; overflow: visible;
  /* faint ruled lines + edge shading on warm receipt paper */
  background:
    repeating-linear-gradient(0deg, transparent 0 27px, rgba(0,0,0,.03) 27px 28px),
    linear-gradient(90deg, rgba(0,0,0,.05), transparent 7%, transparent 93%, rgba(0,0,0,.05)),
    #fbfaf4;
  box-shadow: 0 16px 38px rgba(0,0,0,.34);
  font-family: var(--mono);
}
.budget-dialog::after {   /* torn zigzag bottom edge */
  content: ''; position: absolute; left: 0; right: 0; bottom: -12px; height: 12px;
  background:
    linear-gradient(45deg, transparent 33.33%, #fbfaf4 33.33% 66.66%, transparent 66.66%),
    linear-gradient(-45deg, transparent 33.33%, #fbfaf4 33.33% 66.66%, transparent 66.66%);
  background-size: 14px 28px;
  background-position: 0 -14px;
  filter: drop-shadow(0 5px 5px rgba(0,0,0,.12));
}
/* paper feeds down out of the slot; steps() = printer ratchet */
.budget-dialog.printing { animation: printFeed 1.7s steps(28, end) both; }
@keyframes printFeed {
  from { transform: translateY(calc(-100% - 40px)); }
  to   { transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) { .budget-dialog.printing { animation: none; } }

.budget-dialog .head { position: relative; text-align: center; background: transparent; border-bottom: 1px dashed rgba(0,0,0,.45); padding: 24px 22px 16px; }
.budget-dialog .eyebrow { font-family: var(--mono); font-weight: 700; color: #111; letter-spacing: .12em; font-size: 19px; margin-bottom: 9px; }
.budget-dialog .modal-x { position: absolute; top: 12px; right: 14px; border: none; background: transparent; color: #777; font-family: var(--mono); padding: 4px; }
.budget-total { font-family: var(--mono); font-weight: 700; font-size: 30px; letter-spacing: .02em; color: #111; line-height: 1; }
.budget-sub { font-family: var(--mono); font-size: 10.5px; color: #555; margin-top: 6px; }
.budget-body { padding: 6px 22px 26px; }
.bline { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px dashed rgba(0,0,0,.3); }
.bline .info { flex: 1; min-width: 0; }
.bline .info .l { font-family: var(--mono); font-size: 12.5px; font-weight: 700; color: #111; text-transform: uppercase; letter-spacing: .02em; }
.bline .info .m { font-family: var(--mono); font-size: 9.5px; color: #777; margin-top: 3px; }
.bline .edit { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.bline .edit input { font-family: var(--mono); font-size: 12.5px; width: 62px; border: none; border-bottom: 1px dashed #999; border-radius: 0; padding: 4px 2px; background: transparent; text-align: right; color: #111; font-variant-numeric: tabular-nums; }
.bline .edit .u { font-family: var(--mono); font-size: 8.5px; color: #777; width: 62px; }
.bline .amt { font-family: var(--mono); font-size: 13px; font-weight: 700; color: #111; width: 74px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.bline .amt input { font-family: var(--mono); font-size: 13px; font-weight: 700; color: #111; border: none; background: transparent; text-align: right; padding: 0; outline: none; cursor: text; width: 74px; font-variant-numeric: tabular-nums; }
.btotal { display: flex; align-items: baseline; justify-content: space-between; padding: 16px 0 4px; border-top: 3px double #111; margin-top: -1px; }
.btotal .l { font-family: var(--mono); font-size: 13px; font-weight: 700; color: #111; text-transform: uppercase; letter-spacing: .12em; }
.btotal .v { font-family: var(--mono); font-weight: 700; font-size: 21px; color: #111; letter-spacing: .02em; }
.budget-note { font-family: var(--mono); font-size: 9.5px; color: #888; line-height: 1.55; margin: 10px 0 0; text-align: center; }
/* thin fake barcode + ticket number */
.receipt-barcode {
  height: 26px; margin: 16px auto 0; width: 76%;
  background: repeating-linear-gradient(90deg,
    #111 0 2px, transparent 2px 4px,
    #111 4px 5px, transparent 5px 9px,
    #111 9px 12px, transparent 12px 14px,
    #111 14px 15px, transparent 15px 19px,
    #111 19px 21px, transparent 21px 24px);
}
.receipt-barcode-num { font-family: var(--mono); font-size: 9.5px; letter-spacing: .4em; text-align: center; color: #111; margin-top: 5px; }

/* ---- Accommodation modal ---- */
.accom-dialog { max-width: 640px; }
.accom-city { font-family: var(--serif); font-size: 24px; font-weight: 700; letter-spacing: -.02em; color: var(--ink); line-height: 1; }
.accom-sub { font-family: var(--script); font-style: italic; font-size: 13px; color: var(--green); margin-top: 5px; }
.accom-body { padding: 18px 26px 26px; display: flex; flex-direction: column; gap: 14px; }
.opt { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-card); padding: 17px 18px; display: flex; flex-direction: column; gap: 12px; position: relative; }
.opt.chosen { border-color: var(--green); }
.opt .top { display: flex; align-items: flex-start; gap: 10px; }
.opt .choose { flex-shrink: 0; margin-top: 3px; width: 20px; height: 20px; border-radius: var(--r-check); border: 2px solid var(--dash); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
.opt.chosen .choose { border-color: var(--green); background: var(--green); }
.opt .name { font-family: var(--sans); font-size: 16px; font-weight: 700; color: var(--ink); border: none; background: transparent; padding: 0; flex: 1; min-width: 0; outline-offset: 2px; }
.opt .badge { font-family: var(--sans); font-size: 9px; font-weight: 700; color: var(--green); background: var(--green-bg); border-radius: var(--r-pill); padding: 3px 9px; letter-spacing: .06em; text-transform: uppercase; flex-shrink: 0; }
.opt .rm { flex-shrink: 0; width: 28px; height: 28px; border: none; background: transparent; color: var(--ink-faint); cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: var(--r-xs); transition: color .15s, background .15s; }
.opt .rm:hover { color: var(--red); background: var(--rm-hover); }
.opt .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; }
.opt .fld { display: flex; flex-direction: column; gap: 4px; }
.opt .fld--addr { grid-column: 1 / -1; }
.opt .fld label { font-family: var(--sans); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-mute); }
.opt .fld .lk { display: flex; align-items: center; gap: 5px; }
/* width:100% + box-sizing keeps every input inside its grid cell — without it
   the input renders at its intrinsic ~20ch width and spills out of the card */
.opt .fld input { font-family: var(--sans); font-size: 12px; color: var(--ink); border: none; border-bottom: 1px solid var(--line); background: transparent; padding: 3px 0; outline-offset: 2px; min-width: 0; width: 100%; }
/* inputs sharing a row with a trailing ↗ link (address, booking link) grow to
   fill the row so long values (full street addresses) stay visible */
.opt .fld .lk input { flex: 1 1 auto; width: auto; min-width: 0; }
.opt .fld input.price { font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
.opt .fld .lk a { color: var(--gold); font-family: var(--sans); font-size: 12px; font-weight: 800; text-decoration: none; flex-shrink: 0; }
/* phone/app: stack the fields one per row so nothing is cramped or clipped —
   every field (address included) gets the full card width */
@media (max-width: 700px) { .opt .grid { grid-template-columns: 1fr; } }

/* ---- Transport modal ---- */
.transport-dialog { max-width: 380px; }
.transport-city { font-family: var(--serif); font-size: 24px; font-weight: 700; letter-spacing: -.02em; color: var(--ink); line-height: 1; }
.transport-body { padding: 22px 26px 30px; display: flex; flex-direction: column; gap: 22px; }
.t-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.t-pill {
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  padding: 6px 16px; border-radius: 20px;
  border: 1.5px solid var(--line); background: var(--surface); color: var(--ink-soft);
  cursor: pointer; transition: border-color .15s, background .15s, color .15s;
}
.t-pill:hover { border-color: var(--ink-mute); color: var(--ink); }
.t-pill.active { color: #fff; }
.t-row-3 { display: grid; grid-template-columns: 1fr 1fr 52px; gap: 20px; }
.t-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.t-fld { display: flex; flex-direction: column; gap: 7px; }
.t-fld label { font-family: var(--sans); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-mute); }
.t-line-inp {
  font-family: var(--sans); font-size: 14px; color: var(--ink);
  border: none; border-bottom: 1px solid var(--line); background: transparent;
  padding: 4px 0; width: 100%; min-width: 0; outline: none;
  font-variant-numeric: tabular-nums;
}
.t-line-inp::placeholder { color: var(--ink-faint); }
.t-line-inp:focus { border-bottom-color: var(--ink); }
.t-transfer { text-align: center; }
.t-cost-row { display: flex; align-items: baseline; gap: 4px; border-bottom: 1px solid var(--line); }
.t-cost-row .t-line-inp { border-bottom: none; }
.t-unit { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); flex-shrink: 0; }
.t-cost-row:focus-within { border-bottom-color: var(--ink); }
/* reward points live alongside cost on a Flight leg — gold ties it to the
   miles stat's accent color elsewhere in the app */
.t-fld.t-reward { margin-top: 18px; }
.t-fld.t-reward label { color: var(--gold); }
.t-fld.t-reward .t-unit { color: var(--gold); }

/* mc-transport-btn tints the route icon with mode color */
.mc-back .mc-transport-btn { border-color: currentColor; opacity: 0.85; }

/* responsive: narrow screens — aside stacks below map, page scrolls */
@media (max-width: 799px) {
  .aside { flex-basis: 100%; }
  .page { padding: 16px 12px 60px; }
  .iti-dialog { height: calc(100vh - 64px); }
  .iti-body { flex-direction: column; overflow-y: auto; }
  .iti-left { width: 100%; border-right: none; border-bottom: 1px solid var(--line); overflow-y: visible; }
  .iti-right { overflow-y: visible; padding: 20px 18px 28px; animation: none; }
}

/* tablet-portrait web (iPad, 701–950px): the ledger's two-column itinerary
   squeezes the calendar to a narrow strip, so its outfit stickers turn tiny.
   Stack it (calendar full-width above the day planner) so the calendar cells —
   and the outfits in them — get the full page width. */
@media (min-width: 701px) and (max-width: 950px) {
  .iti-body { flex-direction: column; overflow-y: auto; }
  .iti-left { flex: 0 0 auto; width: 100%; padding: 0 4px 20px; border-right: none; border-bottom: 1px solid var(--line); overflow-y: visible; }
  .iti-right { flex: 0 0 auto; overflow-y: visible; }
  .leaf-days .iti-left { padding: 0 4px 20px; }
}

/* ============================================================
   APP BOOK (≤700px) — the phone twin of the web ledger: the
   overview stays in normal document flow; the Itinerary / Hotel /
   Transport sub-pages rise up over it as fixed overlays, with a
   tab bar pinned to the top to switch between pages.
   ============================================================ */
@media (max-width: 700px) {
  /* prose date range (from the web version) between the map and the stats.
     The generic .meta-range prose styling lives in the ≥701px ledger block, so
     it must be restated here — critically .date-seg needs position:relative so
     the touch overlay input (.date-native, absolute/inset:0 in the hover:none
     block) stays confined to the date text instead of covering the whole page. */
  .app-ov .meta-range {
    display: flex; align-items: baseline; flex-wrap: wrap; gap: 0;
    margin: 2px 4px 12px; padding: 2px 0;
    font-family: var(--serif); font-size: 20px; font-weight: 600; letter-spacing: -.01em;
    color: var(--green-dark);
  }
  .app-ov .meta-range .date-tail { white-space: nowrap; }
  .app-ov .meta-range .date-seg { position: relative; display: inline-block; cursor: pointer; color: inherit; white-space: nowrap; }
  /* parked + invisible by default (the ≥701px base rule doesn't reach here); the
     hover:none block below promotes it to a full-cover tap target on touch */
  .app-ov .meta-range .date-native {
    position: absolute; left: 0; top: 100%; width: 1px; height: 1px;
    opacity: 0; border: none; padding: 0; margin: 0; pointer-events: none;
  }
  .app-ov .meta-range .date-dash { margin: 0 8px; color: var(--green-dark); }
  .app-ov .meta-range .date-year { color: var(--green-dark); }
  .app-ov .meta-range .saved { display: none; }

  /* entry cards: a row of tappable cards between the map and the stats box */
  .app-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 4px 14px; }
  .app-card {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 15px 8px; border: 1px solid var(--line); border-radius: var(--r-card);
    background: var(--surface); color: var(--ink);
    font-family: var(--sans); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: border-color .15s ease, transform .1s ease;
  }
  .app-card svg { color: var(--red); }
  .app-card:active { transform: scale(.97); }
  .app-card:hover { border-color: var(--ink-faint); }

  /* the tab bar: pinned to the top, only present once a sub-page is open. The
     right padding clears the fixed action cluster (undo/memories/theme). */
  .app-tabs {
    position: fixed; top: 0; left: 0; right: 0; z-index: 60;
    display: flex; gap: 5px;
    padding: calc(env(safe-area-inset-top, 0px) + 8px) 130px 8px max(10px, env(safe-area-inset-left));
    background: var(--shell); border-bottom: 1px solid var(--line);
  }
  .app-root[data-page="0"] .app-tabs { display: none; }
  .app-tab {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 7px 2px; border: 1px solid transparent; border-radius: 12px;
    background: none; color: var(--ink-soft);
    font-family: var(--sans); font-size: 10px; font-weight: 600; letter-spacing: .01em;
    cursor: pointer; transition: background .15s ease, color .15s ease;
  }
  .app-tab svg { display: block; }
  .app-tab.on { background: var(--brown); color: var(--on-brown); }

  /* sub-pages: fixed overlays that rise up over the overview */
  .app-leaf {
    position: fixed; inset: 0; z-index: 50;
    background: var(--shell); overflow-y: auto; -webkit-overflow-scrolling: touch;
    opacity: 0; transform: translateY(100%); pointer-events: none; visibility: hidden;
    transition: transform .5s cubic-bezier(.22, .61, .36, 1), opacity .38s ease, visibility 0s .5s;
  }
  .app-leaf.active {
    opacity: 1; transform: translateY(0); pointer-events: auto; visibility: visible;
    transition: transform .5s cubic-bezier(.22, .61, .36, 1), opacity .3s ease, visibility 0s;
  }
  @media (prefers-reduced-motion: reduce) {
    .app-leaf { transition: opacity .2s ease, visibility 0s .2s; transform: none; }
    .app-leaf.active { transition: opacity .2s ease, visibility 0s; }
  }
  .app-sub-inner {
    min-height: 100%;
    padding: calc(env(safe-area-inset-top, 0px) + 76px) 14px calc(env(safe-area-inset-bottom, 0px) + 28px);
  }

  /* sub-page header: city title · date sub · stop pills */
  .app-page-hd { margin-bottom: 16px; }
  .app-page-title { font-family: var(--serif); font-weight: 700; font-size: 27px; line-height: 1.04; margin: 3px 0 4px; color: var(--ink); }
  .app-page-sub { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); }
  .app-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 11px; }
  .app-pill {
    padding: 5px 12px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--surface); color: var(--ink-soft);
    font-family: var(--sans); font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .app-pill.on { background: var(--brown); color: var(--on-brown); border-color: var(--brown); }
}

/* ============================================================
   PLACED STICKER LAYER
   ============================================================ */
.placed-stickers-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: visible;
  z-index: 10;
}
.placed-stickers-layer--modal {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: visible;
  z-index: 1020;
}
.placed-sticker {
  position: absolute;
  pointer-events: auto;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
}
.placed-sticker:active { cursor: grabbing; }
.placed-sticker img {
  display: block;
  width: 100%;
  height: auto;
  pointer-events: none;
  filter: drop-shadow(0 2px 10px rgba(35,20,12,.18));
}
.placed-sticker__delete {
  position: absolute;
  top: -8px; right: -8px;
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  background: var(--surface);
  color: var(--ink-soft);
  font-size: 13px; line-height: 1;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  padding: 0;
  font-family: var(--sans); font-weight: 700;
  transition: color .15s, border-color .15s;
  z-index: 2;
}
.placed-sticker__delete:hover { color: var(--red); border-color: var(--red); }
.placed-sticker:hover .placed-sticker__delete { display: flex; }
.placed-sticker__resize {
  position: absolute;
  bottom: -5px; right: -5px;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--brown);
  border: 2px solid var(--surface);
  cursor: se-resize;
  display: none;
  z-index: 2;
}
.placed-sticker:hover .placed-sticker__resize { display: block; }

/* ============================================================
   STICKER PANEL
   ============================================================ */
.sticker-panel {
  position: fixed;
  top: 88px; right: 28px;
  width: 284px;
  background: var(--shell);
  border: 1.5px solid var(--line-3);
  border-radius: var(--r-card);
  z-index: 1550;   /* above the intro overlay (1500) so it shows when opened over the intro */
}
.sticker-panel__head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px 10px;
  border-bottom: 1.5px solid var(--line-3);
}
.sticker-panel__hint {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--ink-mute);
  padding: 8px 14px 4px;
  line-height: 1.45;
}
.sticker-panel__strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 10px 14px 16px;
  max-height: 260px;
  overflow-y: auto;
}
.stock-item {
  position: relative;
  width: 52px; height: 62px;
  border-radius: var(--r-btn);
  overflow: hidden;
  cursor: grab;
  flex-shrink: 0;
  touch-action: none;   /* the tile drives its own pointer drag onto the page */
}
.stock-item:active { cursor: grabbing; }
/* floating preview under the finger while dragging a memory out of the tray */
.sticker-drag-ghost {
  position: fixed; z-index: 1200; pointer-events: none;
  width: 80px; height: auto;
  transform: translate(-50%, -50%);
  border-radius: var(--r-btn);
  filter: drop-shadow(0 6px 18px rgba(35,20,12,.35));
  opacity: .92;
}
/* trip-tab touch drag-to-reorder feedback */
.trip-drag-ghost {
  position: fixed; z-index: 1200; pointer-events: none; transform: translate(-50%, -50%);
  padding: 6px 12px; border-radius: 999px;
  background: var(--brown); color: var(--on-brown);
  font-family: var(--sans); font-size: 12px; font-weight: 600; white-space: nowrap;
  box-shadow: 0 4px 14px rgba(35,20,12,.3);
}
.tab-active.drag-source, .tab-inactive.drag-source { opacity: .4; }
.tab-active.drag-target, .tab-inactive.drag-target { box-shadow: 0 0 0 2px var(--red); }
.stock-item img { width: 100%; height: 100%; object-fit: contain; border-radius: var(--r-btn); }
.stock-item__del {
  position: absolute;
  bottom: 2px; right: 2px;
  width: 15px; height: 15px;
  border-radius: 50%;
  border: none;
  background: var(--chip-glass);
  color: var(--ink-soft);
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  font-size: 11px; line-height: 1;
  padding: 0;
  font-family: var(--sans);
}
.stock-item:hover .stock-item__del { display: flex; }
.tool-btn.active { background: var(--line-2); color: var(--ink); }
/* sync button: no beige fill even when linked/active — its dot shows status */
.sync-toggle-btn.active { background: transparent; }

@media (max-width: 720px) {
  .sticker-panel { right: 16px; width: calc(100vw - 32px); }
}

/* ---- Cross-device sync ---- */
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  margin-right: 5px; background: var(--ink-mute);
  box-shadow: 0 0 0 2px color-mix(in oklch, var(--ink-mute) 22%, transparent);
}
.sync-dot.s-off     { background: var(--ink-mute); box-shadow: none; }
.sync-dot.s-synced  { background: var(--green);  box-shadow: 0 0 0 2px var(--green-bg); }
.sync-dot.s-syncing { background: var(--gold);   box-shadow: 0 0 0 2px var(--gold-soft); animation: syncPulse 1s ease-in-out infinite; }
.sync-dot.s-offline { background: var(--ink-mute); }
.sync-dot.s-error   { background: var(--red); box-shadow: 0 0 0 2px color-mix(in oklch, var(--red) 18%, transparent); }
@keyframes syncPulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
@media (max-width: 480px) { .sync-toggle-btn .sync-dot { position: absolute; top: 4px; right: 4px; margin: 0; } .sync-toggle-btn { position: relative; } }

.sync-dialog { max-width: 440px; }
.sync-title { font-family: var(--serif); font-weight: 700; font-size: 26px; color: var(--ink); line-height: 1.05; }
.sync-body { padding: 22px 30px 28px; display: flex; flex-direction: column; gap: 14px; }
.sync-lead { font-family: var(--sans); font-size: 13.5px; line-height: 1.5; color: var(--ink-soft); margin: 0; }
.sync-lead b { color: var(--ink); font-weight: 600; }
.sync-field-lbl { font-family: var(--caps); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute); }
.sync-code-row { display: flex; gap: 8px; }
.sync-code-row input {
  flex: 1; min-width: 0; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--r-sm);
  background: var(--surface); font-family: var(--sans); font-size: 13px; color: var(--ink);
}
.sync-code-out { font-variant-numeric: tabular-nums; letter-spacing: .02em; }
.sync-btn {
  font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer;
  padding: 10px 16px; border-radius: var(--r-sm); border: 1px solid var(--line);
  background: var(--surface); color: var(--ink); white-space: nowrap; transition: background .15s, border-color .15s;
}
.sync-btn:hover { background: var(--line-2); }
.sync-btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
.sync-btn.primary:hover { background: color-mix(in oklch, var(--red) 88%, #000); }
.sync-btn.ghost { color: var(--ink-soft); }
.sync-btn:disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }
.sync-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.sync-actions .sync-btn { flex: 1; text-align: center; }
.open-web-btn {
  display: block; width: 100%; text-align: center; text-decoration: none;
  margin-top: 4px; background: var(--gold-soft); border-color: var(--gold-border); color: var(--gold);
}
.open-web-btn:hover { background: var(--gold-hover); }
a.open-web-btn { padding: 10px 16px; box-sizing: border-box; }
.sync-or { display: flex; align-items: center; gap: 10px; color: var(--ink-mute); font-family: var(--caps); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; }
.sync-or::before, .sync-or::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.sync-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; min-height: 18px; }
.sync-status { font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
.sync-status.s-synced  { color: var(--green); }
.sync-status.s-syncing { color: var(--gold); }
.sync-status.s-error   { color: var(--red); }
.sync-status.s-offline { color: var(--ink-mute); }
.sync-when { font-family: var(--script); font-style: italic; font-size: 12.5px; color: var(--ink-mute); }
.sync-note { font-family: var(--sans); font-size: 11.5px; line-height: 1.5; color: var(--ink-mute); margin: 4px 0 0; }
.sync-steps { margin: 2px 0 4px; padding-left: 20px; display: flex; flex-direction: column; gap: 7px; }
.sync-steps li { font-family: var(--sans); font-size: 13px; line-height: 1.45; color: var(--ink-soft); }
.sync-steps b { color: var(--ink); font-weight: 600; }
.sync-steps code, .sync-note code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11.5px; background: var(--line-2); padding: 1px 5px; border-radius: 4px; color: var(--ink-mid); word-break: break-all; }
.sync-link { color: var(--red); font-weight: 600; text-decoration: none; border-bottom: 1px solid color-mix(in oklch, var(--red) 40%, transparent); }
.sync-link:hover { border-bottom-color: var(--red); }

/* ============================================================
   REDUCED MOTION
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  .iti-right { animation: none; }
  .todo input.txt.done { animation: none; text-decoration-color: var(--green); }
  .sync-dot.s-syncing { animation: none; opacity: 1; }
  .stop { transition: none; }
  .cal-cell { transition: none; }
  .cal-cell.active { transform: none; }
}

/* ============================================================
   PHONE (≤480px) — after the 720px block so phone wins
   ============================================================ */
@media (max-width: 480px) {
  /* stop city: 28px clips behind the iti-btn and nights on narrow screens */
  .stop .city { font-size: 20px; letter-spacing: .04em; }

  /* leg row: compact everything onto one line */
  .leg .inner { gap: 5px; flex-wrap: nowrap; }
  .leg select { font-size: 11px; padding: 4px 6px; max-width: 90px; }
  .leg .dur { min-width: 0; flex: 1 1 60px; }
  .leg .cost { width: 48px; }
  .leg .unit { display: none; }

  /* endpoint: loosen origin input so the date can sit alongside */
  .endpoint input { min-width: 90px; }
}

/* ============================================================
   MAP ROUTE — container-type:size so canvas can use cqi/cqb
   ============================================================ */
.map-route {
  flex: 1 1 480px; min-width: 320px; min-height: 0;
  position: relative;
  align-self: flex-start; /* natural height; overridden in wide-screen media query */
}

.map-canvas {
  position: relative;
  width: 100%;
  aspect-ratio: 740 / 480;
  overflow: visible;
  border-radius: var(--r-card);
  border: 1px solid var(--line);
  /* enables cqi for pin overlays (relative to canvas width) */
  container-type: inline-size;
}

.map-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block; border-radius: var(--r-card);
}

/* ============================================================
   MAIN LEAFLET MAP — replaces static SVG canvas
   ============================================================ */
.main-map-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 740 / 480;
  overflow: visible;
  /* isolate so Leaflet's internal z-indices (200–700) stay contained here */
  isolation: isolate;
  /* lets .map-stop's width respond in cqw to the map's own rendered size below,
     instead of staying a fixed px box that overlaps as the map shrinks */
  container-type: inline-size;
}
.main-map-leaflet {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border-radius: var(--r-card);
  border: 1px solid var(--line);
}
.main-map-leaflet.leaflet-container { background: var(--map-sea); font-family: var(--sans); }

/* Theme-aware Leaflet vectors: Leaflet writes colors as SVG presentation
   attributes at layer creation; these CLASS rules override them, so the
   map re-themes instantly on toggle with zero JS. */
.map-land       { fill: var(--map-land); stroke: var(--map-land-line); }
.map-route-line { stroke: var(--map-route); }
.map-ep-dot     { stroke: var(--line); fill: var(--surface); }
.map-stop-dot   { stroke: var(--red); fill: var(--red); }
.day-route-line { stroke: #1a1a1a; }                       /* dark dashes on the light day map */
[data-theme="dark"] .day-route-line { stroke: #ffffff; }   /* white dashes on the night map */
/* transport-leg polylines: light theme keeps the exact MODE_HEX attribute
   colors (no rule = attribute wins); dark theme lifts them to the bright set */
[data-theme="dark"] .leg-flight          { stroke: var(--red); }
[data-theme="dark"] .leg-train           { stroke: var(--green); }
[data-theme="dark"] .leg-overnight-train { stroke: var(--green-dark); }
[data-theme="dark"] .leg-flying-blue     { stroke: var(--gold); }
[data-theme="dark"] .leg-bus             { stroke: #6E96BE; }

/* itinerary mini "paper map" SVG + main-map card leader lines
   (inline SVG — class rules beat presentation attributes) */
.mini-sea    { fill: var(--mini-sea); }
.mini-land   { fill: var(--mini-land); stroke: var(--mini-border); }
.mini-route  { stroke: var(--mini-route); }
.mini-leader { stroke: var(--mini-leader); }
.mini-dot    { stroke: var(--mini-ring); }

/* smooth rounded joins on country border paths */
.map-country { stroke-linejoin: round; stroke-linecap: round; }

/* city name labels on the minimal basemap */
.map-city-label {
  font-family: var(--sans); font-size: 7.5px; font-weight: 600;
  color: var(--map-label); text-transform: uppercase; letter-spacing: .09em;
  white-space: nowrap; pointer-events: none; line-height: 1;
  padding-left: 2px;
}
.main-pins-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 710;
  overflow: visible;
}
.main-city-labels-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 720;
  overflow: visible;
}
.main-leaders-svg {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 750;
  width: 100%; height: 100%;
  overflow: visible;
}
.main-cards-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 800;
}
.main-cards-overlay .map-stop {
  /* scales with the map's own rendered width (cqw of .main-map-wrap) instead of a
     fixed 155px, so cards shrink in step with the map instead of clustering at
     narrow viewports. 15.4cqw reproduces today's 155px at the map's normal/wide
     rendered width (~1008px); clamped so it never grows past that nor shrinks
     below a legible size. _positionMainCards() mirrors this ratio in JS for its
     spacing/clamp math — keep the two in sync if this changes. */
  width: clamp(100px, 15.4cqw, 155px);
  pointer-events: all;
}
.map-pin-outer {
  position: absolute;
  pointer-events: all;
}
.map-pin-main-wrap { background: none; border: none; }
.map-pin-main {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--red);
  border: 2px solid oklch(97% 0.005 60);
  display: flex; align-items: center; justify-content: center;
}
.map-pin-main .pin-order-input {
  width: 22px; height: 22px;
  font-size: 9px; line-height: 22px;
}
/* web ledger: static pin number — the tap opens the dock card, so the number
   itself must not intercept the pointer */
.map-pin-main .pin-order-num {
  color: #fff; font-family: var(--sans); font-weight: 700; font-size: 9px; line-height: 1;
  pointer-events: none; user-select: none;
}

/* stop pins drop in when the map scrolls into view (JS toggles the container
   class on .main-pins-overlay: pins-wait → pins-drop → settled/no-class).
   Falls from well above with gravity acceleration, then a squash + bounce
   landing so the drop reads clearly. Per-keyframe timing functions shape it. */
@keyframes pinDrop {
  0%   { transform: translateY(-90px) scale(.85); opacity: 0; animation-timing-function: cubic-bezier(.4, 0, .75, .2); }
  14%  { opacity: 1; }
  46%  { transform: translateY(0) scale(1); animation-timing-function: ease-out; }        /* impact */
  60%  { transform: translateY(0) scaleX(1.28) scaleY(.74); animation-timing-function: ease-out; }  /* squash */
  76%  { transform: translateY(-13px) scaleX(.96) scaleY(1.05); animation-timing-function: ease-in; } /* rebound */
  90%  { transform: translateY(0) scaleX(1.08) scaleY(.93); animation-timing-function: ease-out; }   /* land again */
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
.main-pins-overlay.pins-wait .map-pin-main { opacity: 0; }
.main-pins-overlay.pins-drop .map-pin-main {
  transform-origin: center bottom;
  animation: pinDrop .8s both;
}
.main-pins-overlay.pins-drop .map-pin-outer:nth-child(1) .map-pin-main { animation-delay: 0ms; }
.main-pins-overlay.pins-drop .map-pin-outer:nth-child(2) .map-pin-main { animation-delay: 110ms; }
.main-pins-overlay.pins-drop .map-pin-outer:nth-child(3) .map-pin-main { animation-delay: 220ms; }
.main-pins-overlay.pins-drop .map-pin-outer:nth-child(4) .map-pin-main { animation-delay: 330ms; }
.main-pins-overlay.pins-drop .map-pin-outer:nth-child(5) .map-pin-main { animation-delay: 440ms; }
.main-pins-overlay.pins-drop .map-pin-outer:nth-child(6) .map-pin-main { animation-delay: 550ms; }
.main-pins-overlay.pins-drop .map-pin-outer:nth-child(n+7) .map-pin-main { animation-delay: 660ms; }
@media (prefers-reduced-motion: reduce) {
  .main-pins-overlay.pins-drop .map-pin-main { animation: none; }
}

/* ============================================================
   WEB LEDGER (≥ 701px) — the planner as a left-bound horizontal
   ledger notebook. The viewport is the desk; the book sits on it
   with a stitched spine on the left, divider tabs on the right
   edge, and one full-width leaf per page. Leaves keep layout
   while hidden (visibility, not display) so Leaflet holds size.
   Below 701px the app page renders instead — none of this applies.
   ============================================================ */
@media (min-width: 701px) {
  html, body { overflow: hidden; }
  :root {
    --ledger-rule:   rgba(26, 26, 26, .05);    /* faint account-book ruling */
    --ledger-margin: rgba(145, 4, 12, .16);    /* the red margin line */
  }
  [data-theme="dark"] {
    --ledger-rule:   rgba(250, 250, 247, .055);
    --ledger-margin: rgba(201, 58, 65, .22);
  }

  /* full-bleed pages — no framed book, no desk margin */
  .ledger-stage {
    position: relative;
    height: 100vh; height: 100dvh;
    /* clip, not hidden: the waiting leaves sit translated a full viewport
       below, and a hidden-overflow stage could still be scrolled to them
       programmatically (focus jumps) — clip can never scroll */
    overflow: hidden; overflow: clip;
    /* base matches the intro + body shell so the intro->planner scroll seam
       is invisible in dark mode (cards inside use --surface to sit above it) */
    background: var(--shell);
  }
  .ledger-book {
    position: relative;
    width: 100%; height: 100%;
    background: var(--shell);
  }

  /* ---- leaves — vertical slide, same motion as the intro→trip scroll:
     the outgoing page slides UP out of view while the incoming one rises
     from BELOW to replace it. past = parked above, incoming = below fold. ---- */
  .ledger-leaf {
    position: absolute; inset: 0;
    overflow: hidden;
    background: var(--shell);           /* opaque so leaves never show through mid-slide */
    visibility: hidden; pointer-events: none;
    z-index: 1;
    transform: translate3d(0, 100%, 0);
    transition: transform .62s cubic-bezier(0.22, 0.61, 0.36, 1), visibility 0s .62s;
  }
  .ledger-leaf.past { transform: translate3d(0, -100%, 0); }
  .ledger-leaf.active {
    transform: translate3d(0, 0, 0);
    visibility: visible; pointer-events: auto; z-index: 2;
    transition: transform .62s cubic-bezier(0.22, 0.61, 0.36, 1), visibility 0s;
  }
  @media (prefers-reduced-motion: reduce) { .ledger-leaf { transition: none; } }
  .leaf-inner { position: relative; width: 100%; height: 100%; }
  .leaf-folio {
    position: absolute; bottom: 10px; right: 20px;
    font-family: var(--mono); font-size: 10px; letter-spacing: .28em;
    color: var(--ink-mute); z-index: 6; pointer-events: none;
  }
  .leaf-route .leaf-folio { right: auto; left: 20px; z-index: 6; }

  /* ---- page 1 · map and info side by side, so the map is never covered ---- */
  .leaf-route .leaf-inner {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 360px;
    grid-template-rows: 100%;
  }
  /* the map is a framed block inset from the page edges — left/top/bottom
     keep 24px of page margin; the right edge (facing the dock) is tighter
     at 12px to match the dock↔tabs gap */
  .leaf-route .ledger-map {
    position: relative; min-width: 0; min-height: 0;
    margin: 24px 12px 24px 24px;
    height: calc(100% - 48px);          /* fill the row minus top+bottom margin */
